<div class="header">
  <div class="breadcrumb"><a href="index.html">← Voltar ao painel geral</a></div>
  <div class="header-top">
    <div>

</div>

<div class="name-modal-overlay" id="name-modal" style="display:none">
  <div class="modal-box">
    <h2>Bem-vindo ao seu sistema de estudos!</h2>
    <p>Como você se chama?</p>
    <input type="text" id="name-input" placeholder="Seu nome" maxlength="40" autocomplete="off" onkeydown="handleNameKeydown(event)">
    <button onclick="saveUserName()">Começar</button>
  </div>
</div>

<script>
// ─── Nome do usuário ─────────────────────────────────────────────────────
function initUserName() {
  const name = localStorage.getItem('de_user_name');
  if (name) {
    updateGreeting(name.split(' ')[0]);
  } else {
    document.getElementById('name-modal').style.display = 'flex';
    document.getElementById('name-input').focus();
  }
}

function openNameModal() {
  const input = document.getElementById('name-input');
  input.value = localStorage.getItem('de_user_name') || '';
  document.getElementById('name-modal').style.display = 'flex';
  input.focus();
  input.select();
}

function saveUserName() {
  const input = document.getElementById('name-input');
  const name = input.value.trim();
  if (!name) {
    input.style.borderColor = 'var(--red)';
    input.focus();
    return;
  }
  input.style.borderColor = '';
  const firstName = name.split(' ')[0];
  localStorage.setItem('de_user_name', name);
  document.getElementById('name-modal').style.display = 'none';
  updateGreeting(firstName);
}

function updateGreeting(name) {
  const el = document.getElementById('user-greeting');
  if (el) {
    el.innerHTML = `Olá, <strong>${name}</strong>! <a class="user-edit" onclick="openNameModal()">editar nome</a>`;
  }
}

function handleNameKeydown(e) {
  if (e.key === 'Enter') saveUserName();
}

const STORAGE_KEY = 'de_module_processos_v1';

// ─── Backup completo (todas as chaves) ────────────────────────────────────
const BACKUP_KEYS = [
  'de_user_name',
  'de_study_local_v2',
  'de_module_sql_v1',
  'de_module_modelagem_v1',
  'de_module_airflow_v1',
  'de_module_python_v1',
  'de_module_cloud_v1',
  'de_module_processos_v1'
];

function exportBackup() {
  const data = {};
  BACKUP_KEYS.forEach(function(key) {
    const val = localStorage.getItem(key);
    if (val !== null) data[key] = val;
  });
  const name = (localStorage.getItem('de_user_name') || 'usuario').split(' ')[0]
    .toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
  const date = new Date().toISOString().split('T')[0];
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'bootcamp-etransparente-backup-' + name + '-' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup exportado!', '⬇');
}

function importBackup() {
  document.getElementById('import-file-input').click();
}

function handleImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      let count = 0;
      BACKUP_KEYS.forEach(function(key) {
        if (data[key] !== undefined) {
          localStorage.setItem(key, data[key]);
          count++;
        }
      });
      if (count === 0) {
        showToast('Erro: nenhuma chave reconhecida no arquivo.', '❌');
        return;
      }
      showToast(count + ' dados importados! Recarregando...', '✅');
      setTimeout(function() { location.reload(); }, 1500);
    } catch (err) {
      showToast('Erro: arquivo invalido. Verifique o JSON.', '❌');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

const LESSONS = [
{
  id: 'sql_challenges', tag: 'critical',
  title: 'SQL challenges — LeetCode / HackerRank',
  eyebrow: 'Aula 1 de 6 · Preparação técnica',
  sub: 'Como treinar de forma deliberada para o filtro mais comum de qualquer processo seletivo',
  body: `
<p>Plataformas como LeetCode (categoria Database) e HackerRank (domínio SQL) simulam o formato mais comum de teste técnico em processos seletivos de dados. Entender o padrão de dificuldade e os tipos de problema que aparecem permite treinar de forma deliberada, em vez de resolver exercícios aleatórios sem direção.</p>
<h3>Os quatro tipos de problema que dominam os testes</h3>
<ul>
  <li><strong>JOINs com múltiplas tabelas e filtros condicionais</strong> — o tipo mais comum, testando se você entende relacionamento entre entidades (visto em detalhe na Aula 2 do Módulo de SQL).</li>
  <li><strong>Window functions para ranking</strong> — "encontre o top N por grupo" é uma das perguntas mais recicladas em processos seletivos de qualquer nível.</li>
  <li><strong>Subqueries para comparação com agregados</strong> — "funcionários que ganham acima da média do próprio departamento" e variações.</li>
  <li><strong>Detecção de duplicatas e deduplicação</strong> — geralmente resolvido com ROW_NUMBER() particionado pela chave de duplicidade.</li>
</ul>
<h3>Um padrão de deduplicação que vale memorizar</h3>
<pre><code>WITH ranked AS (
  SELECT *,
    ROW_NUMBER() OVER (PARTITION BY email ORDER BY data_cadastro DESC) AS rn
  FROM usuarios
)
SELECT * FROM ranked WHERE rn = 1;
-- Mantém apenas o cadastro mais recente por email, remove duplicatas</code></pre>
<div class="callout tip">💡 Esse padrão — ROW_NUMBER particionado pela chave de duplicidade, ordenado pelo critério de "qual manter", seguido de filtro rn = 1 — resolve a maioria dos problemas de deduplicação que aparecem em testes técnicos.</div>
<h3>Como praticar de forma deliberada, não apenas repetitiva</h3>
<p>Resolver 100 exercícios aleatórios é menos eficiente do que: <strong>(1)</strong> identificar os padrões recorrentes (os quatro tipos acima), <strong>(2)</strong> praticar cada padrão até reconhecê-lo instantaneamente no enunciado, <strong>(3)</strong> cronometrar-se para simular a pressão real de um teste técnico com tempo limitado.</p>
<h3>Lendo o enunciado com atenção — onde a maioria erra</h3>
<div class="callout warn">⚠️ Um erro comum sob pressão de tempo: não verificar se o problema pede "todos os X" (LEFT JOIN) ou "apenas X com correspondência" (INNER JOIN). Enunciados de teste técnico costumam ter uma palavra-chave sutil ("incluindo aqueles sem...", "apenas os que...") que determina o tipo de JOIN correto — ler rápido demais é uma causa comum de erro, não falta de conhecimento técnico.</div>
<h3>O ambiente de teste real vs a plataforma de prática</h3>
<p>Muitas empresas usam plataformas próprias (Coderbyte, CodeSignal) ou compartilham a tela em uma chamada ao vivo em vez de LeetCode/HackerRank diretamente. Praticar em mais de uma plataforma ajuda a não depender de recursos específicos (como autocomplete) que podem não estar disponíveis no ambiente real da entrevista.</p>
<h3>Uma lista de prática estruturada</h3>
<p>O "LeetCode SQL 50" é uma lista curada especificamente para cobrir os padrões mais testados em entrevistas, organizada por dificuldade crescente — uma boa estrutura para progressão deliberada em vez de exercícios aleatórios sem sequência lógica.</p>
`,
  recap: [

function htmlToMarkdown(html) {
  let md = html;
  md = md.replace(/<div class="callout[^"]*">\s*([\s\S]*?)\s*<\/div>/g, (m, p1) => '> ' + p1.replace(/<[^>]+>/g,'').trim() + '\n\n');
  md = md.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, (m, p1) => '```sql\n' + p1.trim() + '\n```\n\n');
  md = md.replace(/<h3>(.*?)<\/h3>/g, '\n### $1\n\n');
  md = md.replace(/<h4>(.*?)<\/h4>/g, '\n#### $1\n\n');
  md = md.replace(/<hr>/g, '\n---\n\n');
  md = md.replace(/<ol>/g, '\n').replace(/<\/ol>/g, '\n');
  md = md.replace(/<ul>/g, '\n').replace(/<\/ul>/g, '\n');
  md = md.replace(/<li>\s*([\s\S]*?)\s*<\/li>/g, '- $1\n');
  md = md.replace(/<p>\s*([\s\S]*?)\s*<\/p>/g, '$1\n\n');
  md = md.replace(/<strong>(.*?)<\/strong>/g, '**$1**');
  md = md.replace(/<em>(.*?)<\/em>/g, '_$1_');
  md = md.replace(/<code>(.*?)<\/code>/g, '`$1`');
  md = md.replace(/<[^>]+>/g, '');
  md = md.replace(/\n{3,}/g, '\n\n');
  return md.trim();
}

function generateLessonMarkdown(lesson, moduleTitle) {
  let md = `# ${lesson.title}\n\n`;
  md += `_${lesson.eyebrow} — ${moduleTitle}_\n\n`;
  md += `> ${lesson.sub}\n\n`;
  md += '---\n\n';
  md += htmlToMarkdown(lesson.body);
  md += '\n\n## Recapitulando\n\n';
  lesson.recap.forEach(r => md += `- ${r}\n`);
  md += '\n## Aprofundar no NotebookLM\n\n';
  md += `**Assunto do notebook:** ${lesson.nblm.subject}\n\n`;
  md += `**Perguntas-guia para o Audio Overview:**\n\n`;
  lesson.nblm.questions.forEach(q => md += `- ${q}\n`);
  md += `\n**Fonte complementar sugerida:** ${lesson.nblm.source}\n\n`;
  md += '---\n\n';
  md += `**Teste rápido:** ${lesson.quiz.q}\n\n`;
  lesson.quiz.options.forEach((o,i) => md += `${i === lesson.quiz.correct ? '- [x]' : '- [ ]'} ${o}\n`);
  md += `\n> **Explicação:** ${lesson.quiz.explanation}\n`;
  return md;
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function loadData() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch(e){}
  return { done: {}, quizResults: {} };
}

  const t = document.getElementById('toast');

}

function toggleDone(lessonId) {
  if (APP.quizResults[lessonId] !== true) {
    showToast('Responda o teste rápido corretamente primeiro!', '📝');
    return;
  }
  APP.done[lessonId] = !APP.done[lessonId];
  saveData(); updateModuleProgress(); renderSidebar(); renderContent();
  syncToHub();
  showToast(APP.done[lessonId] ? 'Aula marcada como concluída!' : 'Desmarcada', APP.done[lessonId] ? '✅' : '↩️');
}
function syncToHub() {
  try {
    const raw = localStorage.getItem('de_study_local_v2');
    if (!raw) return;
    const hub = JSON.parse(raw);
    LESSONS.forEach((l, i) => { hub.checks[`process_${i}`] = !!APP.done[l.id]; });
    localStorage.setItem('de_study_local_v2', JSON.stringify(hub));
  } catch(e) {}
}
function answerQuiz(lessonIdx, chosen) {
  const lesson = LESSONS[lessonIdx];
  const opts = document.querySelectorAll(`#qc-opts-${lesson.id} .qc-opt`);
  if (opts[0].disabled) return;
  opts.forEach((o, i) => {
    o.disabled = true;
    if (i === lesson.quiz.correct) o.classList.add('correct');
    if (i === chosen && chosen !== lesson.quiz.correct) o.classList.add('wrong');
  });
  const ok = chosen === lesson.quiz.correct;
  APP.quizResults[lesson.id] = ok;
  saveData();
  const fb = document.getElementById(`qc-fb-${lesson.id}`);
  if (ok) {
    fb.innerHTML = '✅ Correto! ' + lesson.quiz.explanation;
    fb.className = 'qc-fb show correct';
  } else {
    fb.innerHTML = '❌ Incorreto. ' + lesson.quiz.explanation + '<br><br><button class="hdr-btn" onclick="resetQuiz(' + lessonIdx + ')">Responder novamente</button>';
    fb.className = 'qc-fb show wrong';
  }
}
function resetQuiz(lessonIdx) {
  const lesson = LESSONS[lessonIdx];

}
