<script>
// ─── Nome do usuário ─────────────────────────────────────────────────────
function initUserName() {
  const name = localStorage.getItem('de_user_name');
  if (name) {
    updateGreeting(name.split(' ')[0]);
  } else {
    document.getElementById('name-modal').style.display = 'flex';
    document.getElementById('name-input').focus();
  }
}

function openNameModal() {
  const input = document.getElementById('name-input');
  input.value = localStorage.getItem('de_user_name') || '';
  document.getElementById('name-modal').style.display = 'flex';
  input.focus();
  input.select();
}

function saveUserName() {
  const input = document.getElementById('name-input');
  const name = input.value.trim();
  if (!name) {
    input.style.borderColor = 'var(--red)';
    input.focus();
    return;
  }
  input.style.borderColor = '';
  const firstName = name.split(' ')[0];
  localStorage.setItem('de_user_name', name);
  document.getElementById('name-modal').style.display = 'none';
  updateGreeting(firstName);
}

function updateGreeting(name) {
  const el = document.getElementById('user-greeting');
  if (el) {
    el.innerHTML = `Olá, <strong>${name}</strong>! <a class="user-edit" onclick="openNameModal()">editar nome</a>`;
  }
}

function handleNameKeydown(e) {
  if (e.key === 'Enter') saveUserName();
}

const STORAGE_KEY = 'de_module_cloud_v1';

// ─── Backup completo (todas as chaves) ────────────────────────────────────
const BACKUP_KEYS = [
  'de_user_name',
  'de_study_local_v2',
  'de_module_sql_v1',
  'de_module_modelagem_v1',
  'de_module_airflow_v1',
  'de_module_python_v1',
  'de_module_cloud_v1',
  'de_module_processos_v1'
];

function exportBackup() {
  const data = {};
  BACKUP_KEYS.forEach(function(key) {
    const val = localStorage.getItem(key);
    if (val !== null) data[key] = val;
  });
  const name = (localStorage.getItem('de_user_name') || 'usuario').split(' ')[0]
    .toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
  const date = new Date().toISOString().split('T')[0];
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'bootcamp-etransparente-backup-' + name + '-' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup exportado!', '⬇');
}

function importBackup() {
  document.getElementById('import-file-input').click();
}

function handleImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      let count = 0;
      BACKUP_KEYS.forEach(function(key) {
        if (data[key] !== undefined) {
          localStorage.setItem(key, data[key]);
          count++;
        }
      });
      if (count === 0) {
        showToast('Erro: nenhuma chave reconhecida no arquivo.', '❌');
        return;
      }
      showToast(count + ' dados importados! Recarregando...', '✅');
      setTimeout(function() { location.reload(); }, 1500);
    } catch (err) {
      showToast('Erro: arquivo invalido. Verifique o JSON.', '❌');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

const LESSONS = [
{
  id: 'adls', tag: 'important',
  title: 'Azure Data Lake Gen2 — estrutura e ACL',
  eyebrow: 'Aula 1 de 9 · Armazenamento',
  sub: 'A base do seu Data Lake — como ela combina o melhor de dois mundos',
  body: `
<p>Azure Data Lake Storage Gen2 (ADLS Gen2) combina o Azure Blob Storage tradicional (armazenamento de objetos, barato e escalável) com um namespace hierárquico — pastas e subpastas reais, não apenas prefixos simulados em nomes de arquivo. Essa combinação é o que permite organizar um Data Lake em camadas (Bronze/Silver/Gold) com estrutura de diretórios real e permissões granulares por pasta.</p>
<h3>Namespace hierárquico — a diferença central do Blob Storage padrão</h3>
<p>No Blob Storage sem namespace hierárquico, uma "pasta" é apenas uma convenção de nomenclatura — <code>bronze/ongs/2026/01/dados.json</code> é, tecnicamente, um único nome de blob com barras. Operações como renomear ou mover uma "pasta inteira" exigiriam reescrever cada blob individualmente. Com namespace hierárquico ativado (o que define um Storage Account como ADLS Gen2), pastas são objetos reais no sistema de arquivos, tornando operações de diretório atômicas e eficientes.</p>
<pre><code># Estrutura típica de um Data Lake em ADLS Gen2
container/
  bronze/
    ongs/2026/01/dados_brutos.json
  silver/
    ongs/dados_limpos.parquet
  gold/
    score_transparencia.parquet</code></pre>
<h3>ACLs — controle de acesso granular por pasta</h3>
<p>Além do controle de acesso baseado em roles do IAM do Azure (aplicado no nível do Storage Account ou container), ADLS Gen2 permite ACLs (Access Control Lists) no estilo POSIX, granulares até o nível de pasta ou arquivo individual — permitindo, por exemplo, que um time tenha acesso de leitura apenas à camada Gold, sem visibilidade sobre a Bronze com dados brutos e potencialmente sensíveis.</p>
<h3>Containers vs pastas — a organização em dois níveis</h3>
<p>Um Storage Account pode ter múltiplos containers (o nível mais alto de organização, similar a um bucket no S3), e dentro de cada container, a estrutura de pastas hierárquica organiza os dados. Uma decisão comum de design: um container por camada Medallion (<code>bronze</code>, <code>silver</code>, <code>gold</code>) versus um único container com pastas de camada dentro dele — ambos funcionam, mas containers separados facilitam aplicar políticas de acesso e ciclo de vida diferentes por camada de forma mais direta.</p>
<h3>Integração nativa com ferramentas de processamento</h3>
<p>ADLS Gen2 é a camada de armazenamento padrão para serviços como Azure Synapse Analytics e Azure Databricks, além de ser acessível diretamente por Pandas, Spark, e Airflow (via providers específicos) — o que o torna uma peça central e não isolada dentro do ecossistema de dados Azure.</p>
<h3>Hot, Cool e Archive — tiers de custo por frequência de acesso</h3>
<div class="callout tip">💡 ADLS Gen2 (via Blob Storage) oferece tiers de armazenamento com custos diferentes conforme a frequência de acesso esperada: <strong>Hot</strong> para dados acessados frequentemente, <strong>Cool</strong> para dados acessados esporadicamente (custo de armazenamento menor, custo de acesso maior), e <strong>Archive</strong> para dados raramente acessados, com o menor custo de armazenamento mas latência de recuperação de horas. A camada Bronze de um pipeline, por exemplo, pode ser movida para Cool ou Archive depois de um certo tempo, já que raramente precisa ser lida novamente após o processamento inicial.</div>
<h3>Autenticação — de chaves de acesso a identidades gerenciadas</h3>

<h3>Anatomia de um Logic App</h3>
<p>Todo Logic App tem um <strong>trigger</strong> (o que inicia o fluxo) seguido de uma sequência de <strong>actions</strong> (os passos executados em resposta):</p>

  body: `
<p>Workload Identity Federation permite que workloads externos ao Google Cloud (como sua VM Azure) acessem recursos do GCP através de identidades federadas, em vez de chaves de conta de serviço (service account keys) — arquivos de credencial de longa duração que representam um risco de segurança significativo se vazados.</p>
<h3>O problema que isso resolve</h3>
<p>Historicamente, para uma aplicação fora do GCP acessar recursos do Google Cloud, era preciso gerar uma chave de conta de serviço: um arquivo JSON com credenciais que, uma vez criado, pode durar anos e concede acesso extenso caso vaze. Chaves de serviço acidentalmente commitadas em repositórios Git, expostas em logs, ou copiadas para máquinas de desenvolvimento são uma das causas mais comuns de vazamento de credenciais em ambientes cloud.</p>
<h3>Como funciona o mecanismo de troca de token</h3>
<p>O fluxo segue a especificação OAuth 2.0 Token Exchange: seu workload (a VM Azure) apresenta uma credencial já existente do seu provedor de identidade original (nesse caso, uma identidade gerenciada do Azure/Microsoft Entra ID) para o Security Token Service do Google, que verifica essa identidade e retorna um token federado de curta duração — geralmente válido por apenas uma hora — em troca.</p>
<pre><code>VM Azure (identidade gerenciada / Entra ID)
    ↓ apresenta token OIDC
Security Token Service do Google (verifica o token)
    ↓ retorna token federado de curta duração
VM Azure usa o token para acessar recursos GCP
    (ex: BigQuery, Cloud Storage) via impersonation de uma Service Account</code></pre>
<h3>Impersonation — o passo intermediário comum</h3>
<p>Frequentemente, o token federado não acessa recursos GCP diretamente — ele é usado para "impersonar" (assumir temporariamente a identidade de) uma Service Account do GCP com as permissões específicas necessárias. Isso permite manter o princípio de least privilege: a Service Account tem só as permissões que aquele workload específico precisa, e o acesso real é sempre temporário e federado, nunca uma chave permanente.</p>

<div class="callout tip">💡 Uma boa analogia: imagine duas empresas no mesmo prédio. Quando alguém da Empresa A precisa de acesso temporário ao andar da Empresa B, não recebe um crachá permanente da Empresa B — mostra seu próprio crachá da Empresa A na recepção, que verifica a identidade e emite um passe de visitante válido só por aquele dia. Workload Identity Federation funciona da mesma forma: sua identidade original é verificada, e você recebe acesso temporário e escopado, nunca uma credencial permanente do outro sistema.</div>
<h3>Vantagens de segurança sobre chaves estáticas</h3>
<ul>
  <li><strong>Sem arquivo para vazar</strong> — não existe uma chave de longa duração armazenada em lugar nenhum.</li>
  <li><strong>Expiração automática</strong> — tokens federados expiram em cerca de uma hora, limitando drasticamente a janela de exposição em caso de comprometimento.</li>
  <li><strong>Auditabilidade</strong> — cada troca de token é rastreável de volta à identidade original que a solicitou.</li>
</ul>
<h3>Condições de acesso — restringindo quem pode federar</h3>
<div class="callout warn">⚠️ Uma boa prática de segurança essencial é configurar condições de atributo restritivas — por exemplo, aceitar apenas tokens vindos de uma VM Azure específica (identificada por atributos únicos), não de qualquer identidade genérica do Azure. Sem essa restrição, o escopo de quem pode federar para aquela Service Account fica perigosamente amplo.</div>

<p>Identity and Access Management (IAM) é o sistema que controla <strong>quem</strong> pode fazer <strong>o quê</strong> em <strong>quais recursos</strong>, em qualquer cloud. O princípio universal por trás de qualquer implementação séria de IAM é o <strong>least privilege</strong> (privilégio mínimo): conceder apenas as permissões estritamente necessárias para uma tarefa específica, nunca acesso amplo "por conveniência".</p>
<h3>Os três elementos que toda decisão de IAM envolve</h3>
<ul>
  <li><strong>Principal</strong> — quem está pedindo acesso (um usuário, uma aplicação, um serviço).</li>
  <li><strong>Ação</strong> — o que essa entidade quer fazer (ler, escrever, deletar, listar).</li>
  <li><strong>Recurso</strong> — sobre o quê a ação seria executada (um bucket específico, uma VM específica, um banco de dados específico).</li>
</ul>
<h3>IAM no Azure — Role-Based Access Control (RBAC)</h3>
<p>O Azure usa RBAC: papéis (roles) predefinidos ou customizados são atribuídos a identidades (usuários, grupos, ou identidades gerenciadas) em um <em>escopo</em> específico — que pode ser todo um Subscription, um Resource Group, ou um recurso individual.</p>
<pre><code># Exemplo conceitual: atribuir o papel "Storage Blob Data Reader"
# a uma Managed Identity, escopado apenas ao container "gold"
Principal: Identidade Gerenciada da VM do pipeline
Role: Storage Blob Data Reader
Escopo: /storageAccounts/meudatalake/containers/gold</code></pre>
<h3>IAM na AWS — Policies em JSON</h3>
<p>A AWS usa políticas escritas em JSON, anexadas a usuários, grupos ou roles, especificando explicitamente ações permitidas ou negadas sobre recursos identificados por ARN (Amazon Resource Name):</p>
<pre><code>{
  "Effect": "Allow",
  "Action": ["s3:GetObject"],
  "Resource": "arn:aws:s3:::meu-bucket/gold/*"

<h3>Roles vs Usuários — por que roles são preferíveis para aplicações</h3>
<div class="callout warn">⚠️ Atribuir permissões diretamente a um usuário (ou pior, hardcoded como credencial em uma aplicação) cria um vínculo frágil e difícil de auditar. Roles (Azure) e IAM Roles (AWS) são identidades "assumíveis" temporariamente por aplicações ou serviços — permitindo que uma VM, uma função serverless, ou um pipeline "assuma" um role com permissões específicas sem que uma credencial de longa duração precise existir, de forma conceitualmente muito próxima ao Workload Identity Federation visto na Aula 5.</div>
<h3>Managed Identities (Azure) — a evolução natural do RBAC</h3>
<p>Uma Managed Identity é uma identidade gerenciada automaticamente pelo Azure e atribuída diretamente a um recurso (como uma VM), eliminando completamente a necessidade de armazenar qualquer credencial — o Azure cuida da rotação e da entrega segura do token de autenticação por baixo dos panos.</p>
<h3>Auditoria — o componente frequentemente esquecido</h3>
<p>Tanto Azure (via Activity Log e Azure Monitor) quanto AWS (via CloudTrail) mantêm logs de auditoria de quem fez o quê, quando, e usando qual identidade — essencial não só para investigação de incidentes de segurança, mas também para identificar permissões concedidas que nunca são realmente usadas (candidatas a serem revogadas, seguindo o princípio de least privilege de forma contínua, não só na configuração inicial).</p>
<h3>Erros comuns de configuração de IAM</h3>
<ul>
  <li>Conceder permissões amplas demais "para simplificar" durante desenvolvimento, e esquecer de restringir depois em produção.</li>
  <li>Usar credenciais de usuário pessoal em pipelines automatizados, em vez de roles/identidades de serviço dedicadas.</li>
  <li>Não revisar periodicamente permissões concedidas — acesso que fez sentido meses atrás pode não ser mais necessário.</li>
</ul>

    let out = '';
    rows.forEach((r, i) => {
      let cells = [...r.matchAll(/<t[dh][^>]*>([\s\S]*?)<\/t[dh]>/g)].map(c => c[1].replace(/<[^>]+>/g,'').trim());
      out += '| ' + cells.join(' | ') + ' |\n';
      if (i === 0) out += '|' + cells.map(()=>' --- ').join('|') + '|\n';
    });
    return out + '\n';
  });
  md = md.replace(/<ul>/g, '\n').replace(/<\/ul>/g, '\n');
  md = md.replace(/<li>\s*([\s\S]*?)\s*<\/li>/g, '- $1\n');
  md = md.replace(/<p>\s*([\s\S]*?)\s*<\/p>/g, '$1\n\n');
  md = md.replace(/<strong>(.*?)<\/strong>/g, '**$1**');
  md = md.replace(/<em>(.*?)<\/em>/g, '_$1_');
  md = md.replace(/<code>(.*?)<\/code>/g, '`$1`');
  md = md.replace(/<[^>]+>/g, '');
  md = md.replace(/\n{3,}/g, '\n\n');
  return md.trim();
}

function generateLessonMarkdown(lesson, moduleTitle) {
  let md = `# ${lesson.title}\n\n`;
  md += `_${lesson.eyebrow} — ${moduleTitle}_\n\n`;
  md += `> ${lesson.sub}\n\n`;
  md += '---\n\n';
  md += htmlToMarkdown(lesson.body);
  md += '\n\n## Recapitulando\n\n';
  lesson.recap.forEach(r => md += `- ${r}\n`);
  md += '\n## Aprofundar no NotebookLM\n\n';
  md += `**Assunto do notebook:** ${lesson.nblm.subject}\n\n`;
  md += `**Perguntas-guia para o Audio Overview:**\n\n`;
  lesson.nblm.questions.forEach(q => md += `- ${q}\n`);
  md += `\n**Fonte complementar sugerida:** ${lesson.nblm.source}\n\n`;
  md += '---\n\n';
  md += `**Teste rápido:** ${lesson.quiz.q}\n\n`;
  lesson.quiz.options.forEach((o,i) => md += `${i === lesson.quiz.correct ? '- [x]' : '- [ ]'} ${o}\n`);
  md += `\n> **Explicação:** ${lesson.quiz.explanation}\n`;
  return md;
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function loadData() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch(e){}
  return { done: {}, quizResults: {} };
}
function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(APP)); } catch(e){} }
let APP = loadData();
let currentLesson = 0;
function showToast(msg, emoji='✅') {
  const t = document.getElementById('toast');
  t.innerHTML = `${emoji} ${msg}`;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2500);
}
function updateModuleProgress() {
  const total = LESSONS.length;
  const done = LESSONS.filter(l => APP.done[l.id]).length;
  document.getElementById('mod-fill').style.width = Math.round((done/total)*100) + '%';
  document.getElementById('mod-label').textContent = `${done} / ${total} subtópicos concluídos`;
}
function renderSidebar() {
  const tagLabel = { critical:'crítico', important:'importante', bonus:'bônus' };
  let html = `<div class="sidebar-title">Módulo 05 · Cloud</div>`;
  html += `<div class="toc-item summary-item ${currentLesson===0?'active':''}" onclick="goTo(0)"><span class="toc-num">—</span><span class="toc-text">Visão geral do módulo</span></div>`;
  html += `<div class="toc-divider"></div><div class="sidebar-title">Aulas</div>`;
  LESSONS.forEach((l, i) => {
    const done = !!APP.done[l.id];
    html += `<div class="toc-item ${currentLesson===i+1?'active':''}" onclick="goTo(${i+1})">
      <span class="toc-num">${i+1}</span>
      <span class="toc-check ${done?'done':''}">${done?'✓':''}</span>
      <span class="toc-text">${l.title}</span>
      <span class="toc-tag ${l.tag}">${tagLabel[l.tag]}</span>
    </div>`;
  });
  document.getElementById('sidebar').innerHTML = html;
}
function goTo(idx) { currentLesson = idx; renderSidebar(); renderContent(); window.scrollTo({top:0,behavior:'smooth'}); }
function toggleDone(lessonId) {
  if (APP.quizResults[lessonId] !== true) {
    showToast('Responda o teste rápido corretamente primeiro!', '📝');
    return;
  }
  APP.done[lessonId] = !APP.done[lessonId];
  saveData(); updateModuleProgress(); renderSidebar(); renderContent();
  syncToHub();
  showToast(APP.done[lessonId] ? 'Aula marcada como concluída!' : 'Desmarcada', APP.done[lessonId] ? '✅' : '↩️');
}
function syncToHub() {
  try {
    const raw = localStorage.getItem('de_study_local_v2');
    if (!raw) return;
    const hub = JSON.parse(raw);
    LESSONS.forEach((l, i) => { hub.checks[`cloud_${i}`] = !!APP.done[l.id]; });
    localStorage.setItem('de_study_local_v2', JSON.stringify(hub));
  } catch(e) {}
}
function answerQuiz(lessonIdx, chosen) {
  const lesson = LESSONS[lessonIdx];
  const opts = document.querySelectorAll(`#qc-opts-${lesson.id} .qc-opt`);
  if (opts[0].disabled) return;
  opts.forEach((o, i) => {
    o.disabled = true;
    if (i === lesson.quiz.correct) o.classList.add('correct');
    if (i === chosen && chosen !== lesson.quiz.correct) o.classList.add('wrong');
  });
  const ok = chosen === lesson.quiz.correct;
  APP.quizResults[lesson.id] = ok;
  saveData();
  const fb = document.getElementById(`qc-fb-${lesson.id}`);
  if (ok) {
    fb.innerHTML = '✅ Correto! ' + lesson.quiz.explanation;
    fb.className = 'qc-fb show correct';
  } else {
    fb.innerHTML = '❌ Incorreto. ' + lesson.quiz.explanation + '<br><br><button class="hdr-btn" onclick="resetQuiz(' + lessonIdx + ')">Responder novamente</button>';
    fb.className = 'qc-fb show wrong';
  }
}
function resetQuiz(lessonIdx) {
  const lesson = LESSONS[lessonIdx];
  delete APP.quizResults[lesson.id];
  saveData();
  renderContent();
}
function exportLessonMD(lessonIdx) {
  const lesson = LESSONS[lessonIdx];
  const md = generateLessonMarkdown(lesson, "Cloud (Azure/AWS/GCP)");
  downloadFile(`cloud_aula${lessonIdx+1}_${lesson.id}.md`, md);
  showToast('Markdown exportado! Pronto pro NotebookLM.', '📄');
}
function exportModuleMD() {
  let full = `# Cloud (Azure/AWS/GCP)\n\n_Módulo completo — exportado para estudo no NotebookLM_\n\n---\n\n`;
  LESSONS.forEach((l) => {
    full += generateLessonMarkdown(l, "Cloud (Azure/AWS/GCP)");
    full += '\n\n---\n\n';
  });
  downloadFile(`cloud_modulo_completo.md`, full);
  showToast('Markdown do módulo completo exportado!', '📄');
}
function renderSummary() {
  let html = `<div style="margin-bottom:20px">
    <h2 style="font-size:20px;margin-bottom:6px">Visão geral — Módulo Cloud (Azure/AWS/GCP)</h2>
    <p style="font-size:13px;color:var(--text2);max-width:620px;line-height:1.6">
      Este módulo cobre os 9 subtópicos de cloud mais relevantes para entrevistas de dados — sua base
      sólida em Azure, equivalência conceitual com AWS e GCP, e o framework de resposta para perguntas
      de trade-off entre clouds. Cada aula tem conteúdo completo, teste de fixação, e seção para o NotebookLM.
    </p>
  </div><div class="summary-grid">`;
  LESSONS.forEach((l, i) => {
    const d = !!APP.done[l.id];
    const q = APP.quizResults[l.id];
    html += `<div class="summary-card" onclick="goTo(${i+1})" style="cursor:pointer">
      <h4>${i+1}. ${l.title} ${d ? '✅' : ''}</h4>
      <p>${l.sub}${q !== undefined ? (q ? ' · Quiz: acertou ✅' : ' · Quiz: errou — revisar 🔴') : ''}</p>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

const VIDEO_FOLDER = 'cloud';
const VIDEO_PREFIX = 'cloud';

function renderVideoBlock(lesson, lessonNum) {
  if (lesson.video) {
    const src = lesson.video;
    return `<div class="video-wrap">
      <video controls preload="metadata">
        <source src="${encodeURI(src)}" type="video/mp4">
        Seu navegador não suporta vídeo HTML5.
      </video>
    </div>`;
  }
  return `<div class="video-placeholder">
    <div class="vp-icon">🎬</div>
    <div class="vp-title">Vídeo ainda não adicionado</div>
    <div class="vp-sub">Vídeo ainda não adicionado — suba no Blob Storage e cole a URL completa no campo video: desta aula</div>
  </div>`;
}

function renderContent() {
  if (currentLesson === 0) { renderSummary(); return; }
  const lesson = LESSONS[currentLesson - 1];
  const done = !!APP.done[lesson.id];
  const idx = currentLesson - 1;
  const nblmQuestionsHtml = lesson.nblm.questions.map(q => `<li>${q}</li>`).join('');
  document.getElementById('content').innerHTML = `
    <div class="lesson-nav">
      <button class="lesson-nav-btn" onclick="goTo(${currentLesson-1})" ${currentLesson<=1?'disabled':''}>← Anterior</button>
      <span class="lesson-progress-label">Aula ${idx+1} de ${LESSONS.length}</span>
      <button class="lesson-nav-btn" onclick="goTo(${currentLesson+1<=LESSONS.length?currentLesson+1:0})">${currentLesson<LESSONS.length?'Próxima →':'Ver resumo →'}</button>
    </div>
    <div class="lesson-card" id="lesson-print-${lesson.id}">
      <div class="lesson-eyebrow">${lesson.eyebrow}</div>
      <h2 class="lesson-title">${lesson.title}</h2>
      <div class="lesson-sub">${lesson.sub}</div>
      <hr>
      ${renderVideoBlock(lesson, idx+1)}
      ${lesson.body}
      <div class="recap"><div class="rt">Recapitulando</div><ul>${lesson.recap.map(r => `<li>${r}</li>`).join('')}</ul></div>
      <div class="nblm-box">
        <div class="nblm-header">🎙️ Aprofundar no NotebookLM</div>
        <div class="nblm-body">
          <div class="nblm-field"><div class="nblm-label">Assunto do notebook</div><div class="nblm-value">${lesson.nblm.subject}</div></div>
          <div class="nblm-field"><div class="nblm-label">Perguntas-guia para o Audio Overview</div><ul class="nblm-questions">${nblmQuestionsHtml}</ul></div>
          <div class="nblm-field"><div class="nblm-label">Fonte complementar sugerida</div><div class="nblm-value">${lesson.nblm.source}</div></div>
        </div>
      </div>
      <div class="source-box"><strong>Como usar:</strong> exporte esta aula em Markdown, suba no NotebookLM junto com a fonte complementar sugerida, e cole as perguntas-guia no campo de customização do Audio Overview.</div>
    </div>
    <div class="mark-bar">
      <button class="mark-check-btn" onclick="toggleDone('${lesson.id}')"><span class="box ${done?'done':''}">${done?'✓':''}</span>Marcar esta aula como concluída</button>
      <button class="hdr-btn primary" onclick="exportLessonMD(${idx})">⬇ Exportar esta aula (.md)</button>
    </div>
    <div class="quick-check">
      <div class="qc-title">🧪 Teste rápido de fixação</div>
      <div class="qc-q">${lesson.quiz.q}</div>
      ${lesson.quiz.code ? `<div class="test-code">${lesson.quiz.code}</div>` : ''}
      <div class="qc-opts" id="qc-opts-${lesson.id}">${lesson.quiz.options.map((o,i) => `<button class="qc-opt" onclick="answerQuiz(${idx},${i})">${o}</button>`).join('')}</div>
      <div class="qc-fb" id="qc-fb-${lesson.id}"></div>
    </div>
  `;
}
updateModuleProgress();
renderSidebar();
renderContent();
initUserName();
</script>
<input type="file" id="import-file-input" accept=".json" style="display:none" onchange="handleImportFile(event)">
</body>
