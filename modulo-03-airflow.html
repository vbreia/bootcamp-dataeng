<script>
// ─── Nome do usuário ─────────────────────────────────────────────────────
function initUserName() {
  const name = localStorage.getItem('de_user_name');
  if (name) {
    updateGreeting(name.split(' ')[0]);
  } else {
    document.getElementById('name-modal').style.display = 'flex';
    document.getElementById('name-input').focus();
  }
}

function openNameModal() {
  const input = document.getElementById('name-input');
  input.value = localStorage.getItem('de_user_name') || '';
  document.getElementById('name-modal').style.display = 'flex';
  input.focus();
  input.select();
}

function saveUserName() {
  const input = document.getElementById('name-input');
  const name = input.value.trim();
  if (!name) {
    input.style.borderColor = 'var(--red)';
    input.focus();
    return;
  }
  input.style.borderColor = '';
  const firstName = name.split(' ')[0];
  localStorage.setItem('de_user_name', name);
  document.getElementById('name-modal').style.display = 'none';
  updateGreeting(firstName);
}

function updateGreeting(name) {
  const el = document.getElementById('user-greeting');
  if (el) {
    el.innerHTML = `Olá, <strong>${name}</strong>! <a class="user-edit" onclick="openNameModal()">editar nome</a>`;
  }
}

function handleNameKeydown(e) {
  if (e.key === 'Enter') saveUserName();
}

const STORAGE_KEY = 'de_module_airflow_v1';

// ─── Backup completo (todas as chaves) ────────────────────────────────────
const BACKUP_KEYS = [
  'de_user_name',
  'de_study_local_v2',
  'de_module_sql_v1',
  'de_module_modelagem_v1',
  'de_module_airflow_v1',
  'de_module_python_v1',
  'de_module_cloud_v1',
  'de_module_processos_v1'
];

function exportBackup() {
  const data = {};
  BACKUP_KEYS.forEach(function(key) {
    const val = localStorage.getItem(key);
    if (val !== null) data[key] = val;
  });
  const name = (localStorage.getItem('de_user_name') || 'usuario').split(' ')[0]
    .toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
  const date = new Date().toISOString().split('T')[0];
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'bootcamp-etransparente-backup-' + name + '-' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup exportado!', '⬇');
}

function importBackup() {
  document.getElementById('import-file-input').click();
}

function handleImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      let count = 0;
      BACKUP_KEYS.forEach(function(key) {
        if (data[key] !== undefined) {
          localStorage.setItem(key, data[key]);
          count++;
        }
      });
      if (count === 0) {
        showToast('Erro: nenhuma chave reconhecida no arquivo.', '❌');
        return;
      }
      showToast(count + ' dados importados! Recarregando...', '✅');
      setTimeout(function() { location.reload(); }, 1500);
    } catch (err) {
      showToast('Erro: arquivo invalido. Verifique o JSON.', '❌');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

const LESSONS = [
{
  id: 'dags', tag: 'important',
  title: 'DAGs — estrutura e configuração',
  eyebrow: 'Aula 1 de 9 · Fundamentos',
  sub: 'A unidade central do Airflow — um grafo de tarefas escrito em Python',
  body: `
<p>Uma DAG (Directed Acyclic Graph) é a unidade central de organização no Airflow: um grafo de tarefas com dependências explícitas, sem ciclos — ou seja, uma task nunca pode depender (direta ou indiretamente) de si mesma. É literalmente um arquivo Python que descreve <em>o quê</em> fazer e <em>em que ordem</em>, sem executar o trabalho pesado ali dentro.</p>
<h3>Anatomia mínima de uma DAG</h3>
<pre><code>from airflow import DAG
from airflow.operators.python import PythonOperator
from datetime import datetime

def extrair_dados():
    print("Extraindo...")

with DAG(
    dag_id="pipeline_etransparente",
    start_date=datetime(2026, 1, 1),
    schedule="@monthly",
    catchup=False,
    tags=["etransparente", "producao"],
) as dag:
    extrair = PythonOperator(
        task_id="extrair",
        python_callable=extrair_dados,
    )</code></pre>
<h3>Os parâmetros que mais importam</h3>
<ul>
  <li><strong>dag_id</strong> — identificador único da DAG dentro do ambiente Airflow. Não pode se repetir.</li>
  <li><strong>start_date</strong> — a partir de quando o Airflow considera a DAG "ativa" para fins de agendamento. Não é a data em que a DAG começa a rodar imediatamente — é usada para calcular a primeira execução programada.</li>
  <li><strong>schedule</strong> — a frequência de execução, seja em expressão cron (<code>"0 0 * * *"</code>) ou em atalhos como <code>@daily</code>, <code>@monthly</code>, ou <code>None</code> para DAGs disparadas manualmente/por evento.</li>
  <li><strong>catchup</strong> — controla se o Airflow deve rodar automaticamente todas as execuções "perdidas" entre <code>start_date</code> e o momento atual. Em pipelines de produção, geralmente se define como <code>False</code> para evitar rodar dezenas de execuções históricas indesejadas ao ativar uma DAG nova.</li>
</ul>
<div class="callout warn">⚠️ Um erro clássico: esquecer <code>catchup=False</code> em uma DAG nova com <code>start_date</code> muito antiga. O Airflow tentará disparar todas as execuções entre essa data e hoje, o que pode sobrecarregar o ambiente ou disparar processamentos indevidos.</div>
<h3>DAG vs DAG Run — uma distinção que confunde iniciantes</h3>
<p>A <strong>DAG</strong> é a definição — o código Python que descreve a estrutura. O <strong>DAG Run</strong> é uma instância concreta de execução dessa definição, associada a uma data lógica específica. Uma mesma DAG pode ter centenas de DAG Runs ao longo do tempo, cada uma com seu próprio status (running, success, failed) e seu próprio conjunto de Task Instances.</p>
<h3>Tags — organização em ambientes com muitas DAGs</h3>
<p>Em ambientes com dezenas ou centenas de DAGs (comum em empresas maiores), <code>tags</code> permitem filtrar e organizar a visualização na UI do Airflow — por projeto, por time responsável, ou por criticidade.</p>
<h3>Onde colocar a lógica pesada</h3>
<p>Uma boa prática de design: o arquivo da DAG deve conter apenas a <em>orquestração</em> (quais tasks existem e como se relacionam), não a lógica de negócio em si. Funções de extração, transformação e carga geralmente vivem em módulos Python separados, importados pela DAG — isso facilita testes unitários da lógica sem precisar simular o ambiente Airflow inteiro.</p>
<pre><code># dag_etransparente.py — só orquestração
from etl.extract import extrair_dados_ongs
from etl.transform import processar_bronze_para_silver

    dados = ti.xcom_pull(task_ids='extract', key='dados_extraidos')
    total = sum(dados.values())
    ti.xcom_push(key='total', value=total)</code></pre>
<p><code>xcom_push</code> grava um valor associado a uma chave; <code>xcom_pull</code> recupera esse valor especificando de qual <code>task_id</code> ele veio. Isso precisa ser feito explicitamente em cada task quando você não usa a TaskFlow API (assunto da última aula deste módulo).</p>

<p>Um Sensor é um tipo especializado de Operator que espera uma condição se tornar verdadeira antes de permitir que o fluxo da DAG continue — por exemplo, esperar um arquivo aparecer em um storage, esperar outra DAG terminar, ou esperar uma linha específica aparecer em uma tabela.</p>

<pre><code>from airflow.sensors.filesystem import FileSensor

<h3>O problema do modo poke tradicional</h3>
<div class="callout warn">⚠️ No modo padrão ("poke"), um Sensor ocupa um slot de worker inteiro durante todo o tempo de espera — mesmo estando ocioso a maior parte do tempo. Em ambientes com muitos Sensors esperando simultaneamente, isso pode esgotar a capacidade de processamento disponível para outras tasks.</div>
<h3>Deferrable Operators — a solução moderna</h3>
<p>Versões mais recentes do Airflow suportam Sensors em modo <em>deferrable</em>, que liberam o worker enquanto esperam, delegando a espera para um processo leve chamado Triggerer. Isso permite ter centenas de Sensors aguardando simultaneamente sem consumir recursos de worker proporcionalmente.</p>
<pre><code>esperar_arquivo = FileSensor(

<p>Depois que <code>extrair</code> termina, <code>transformar_bronze</code> e <code>validar_schema</code> podem rodar em paralelo — ambas dependem apenas de <code>extrair</code>, não uma da outra.</p>
<h3>Fan-in — várias tasks convergindo em uma</h3>
<pre><code>[validar_ongs, validar_score] >> gerar_relatorio_final</code></pre>
<p><code>gerar_relatorio_final</code> só executa depois que <strong>ambas</strong> <code>validar_ongs</code> e <code>validar_score</code> tiverem terminado com sucesso.</p>
<h3>Combinando fan-out e fan-in</h3>
<pre><code>extrair >> [transformar_bronze, validar_schema] >> consolidar >> carregar_gold</code></pre>
<p>Esse padrão em "diamante" é extremamente comum em pipelines reais: uma extração única, processamento paralelo de validações independentes, e depois convergência para consolidar e prosseguir.</p>
<h3>set_upstream e set_downstream — a forma explícita</h3>
<p>Antes da sintaxe com operadores, e ainda útil em casos com lógica condicional complexa, o Airflow também permite declarar dependências chamando métodos diretamente:</p>
<pre><code>transformar.set_upstream(extrair)
# equivalente a: extrair >> transformar

carregar.set_downstream(notificar_sucesso)
# equivalente a: carregar >> notificar_sucesso</code></pre>
<h3>Trigger Rules — quando o padrão "esperar todos com sucesso" não serve</h3>
<p>Por padrão, uma task só dispara quando <strong>todas</strong> as tasks upstream tiveram sucesso (<code>trigger_rule="all_success"</code>). Isso pode ser customizado para cenários específicos:</p>
<pre><code>notificar_erro = PythonOperator(
    task_id="notificar_erro",
    python_callable=enviar_alerta,
    trigger_rule="one_failed",  # dispara assim que UMA upstream falha
)</code></pre>
<div class="callout tip">💡 <code>one_failed</code> é o padrão clássico para tasks de alerta/notificação de erro — elas devem disparar assim que algo falhar, sem esperar todas as outras tasks terminarem. <code>one_success</code> é o inverso, útil quando qualquer um de múltiplos caminhos alternativos já é suficiente para prosseguir.</div>
<h3>Ciclos são proibidos — e o Airflow valida isso</h3>
<p>Como o nome DAG indica ("Directed Acyclic Graph"), o Airflow rejeita qualquer configuração de dependências que crie um ciclo (A depende de B, que depende de A) — isso é detectado na hora do parse do arquivo, antes mesmo de tentar executar.</p>

  body: `
<p>A TaskFlow API, introduzida no Airflow 2.0, elimina boa parte do boilerplate de escrever DAGs com PythonOperator tradicional — especialmente a passagem manual de dados via <code>xcom_push</code>/<code>xcom_pull</code> e a declaração explícita de dependências.</p>
<h3>O antes e depois</h3>
<pre><code>-- ANTES (PythonOperator tradicional)
def extract(**kwargs):
    ti = kwargs['ti']
    dados = {"pedido_1": 100, "pedido_2": 250}
    ti.xcom_push(key='dados', value=dados)

def transform(**kwargs):
    ti = kwargs['ti']
    dados = ti.xcom_pull(task_ids='extract', key='dados')
    total = sum(dados.values())
    ti.xcom_push(key='total', value=total)

extract_task = PythonOperator(task_id='extract', python_callable=extract)
transform_task = PythonOperator(task_id='transform', python_callable=transform)

<pre><code># DEPOIS (TaskFlow API)

@task
def extract():
    return {"pedido_1": 100, "pedido_2": 250}

<h3>Como isso funciona por baixo dos panos</h3>
<p>Quando você chama uma função decorada com <code>@task</code> dentro do arquivo da DAG, o Airflow não executa a função imediatamente — ele retorna um objeto especial (<code>XComArg</code>) que representa "o resultado futuro dessa task". Passar esse objeto como argumento para outra task decorada automaticamente: (1) transporta o valor via XCom nos bastidores, e (2) declara a dependência entre as duas tasks, sem precisar de <code>>></code> explícito.</p>
<h3>multiple_outputs — separando um dicionário em XComs individuais</h3>

<p>Sem <code>multiple_outputs=True</code>, o dicionário inteiro vira um único XCom que precisa ser acessado como um todo. Com essa flag, cada chave do dicionário retornado vira seu próprio XCom individual, facilitando referenciar valores específicos nas tasks seguintes.</p>

function htmlToMarkdown(html) {
  let md = html;
  md = md.replace(/<div class="callout[^"]*">\s*([\s\S]*?)\s*<\/div>/g, (m, p1) => '> ' + p1.replace(/<[^>]+>/g,'').trim() + '\n\n');
  md = md.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, (m, p1) => '```python\n' + p1.trim() + '\n```\n\n');
  md = md.replace(/<h3>(.*?)<\/h3>/g, '\n### $1\n\n');
  md = md.replace(/<h4>(.*?)<\/h4>/g, '\n#### $1\n\n');
  md = md.replace(/<hr>/g, '\n---\n\n');
  md = md.replace(/<ul>/g, '\n').replace(/<\/ul>/g, '\n');
  md = md.replace(/<li>\s*([\s\S]*?)\s*<\/li>/g, '- $1\n');
  md = md.replace(/<p>\s*([\s\S]*?)\s*<\/p>/g, '$1\n\n');
  md = md.replace(/<strong>(.*?)<\/strong>/g, '**$1**');
  md = md.replace(/<em>(.*?)<\/em>/g, '_$1_');
  md = md.replace(/<code>(.*?)<\/code>/g, '`$1`');
  md = md.replace(/<[^>]+>/g, '');
  md = md.replace(/\n{3,}/g, '\n\n');
  return md.trim();
}

function generateLessonMarkdown(lesson, moduleTitle) {
  let md = `# ${lesson.title}\n\n`;
  md += `_${lesson.eyebrow} — ${moduleTitle}_\n\n`;
  md += `> ${lesson.sub}\n\n`;
  md += '---\n\n';
  md += htmlToMarkdown(lesson.body);
  md += '\n\n## Recapitulando\n\n';
  lesson.recap.forEach(r => md += `- ${r}\n`);
  md += '\n## Aprofundar no NotebookLM\n\n';
  md += `**Assunto do notebook:** ${lesson.nblm.subject}\n\n`;
  md += `**Perguntas-guia para o Audio Overview:**\n\n`;
  lesson.nblm.questions.forEach(q => md += `- ${q}\n`);
  md += `\n**Fonte complementar sugerida:** ${lesson.nblm.source}\n\n`;
  md += '---\n\n';
  md += `**Teste rápido:** ${lesson.quiz.q}\n\n`;
  lesson.quiz.options.forEach((o,i) => md += `${i === lesson.quiz.correct ? '- [x]' : '- [ ]'} ${o}\n`);
  md += `\n> **Explicação:** ${lesson.quiz.explanation}\n`;
  return md;
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function loadData() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch(e){}
  return { done: {}, quizResults: {} };
}
function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(APP)); } catch(e){} }
let APP = loadData();
let currentLesson = 0;
function showToast(msg, emoji='✅') {
  const t = document.getElementById('toast');
  t.innerHTML = `${emoji} ${msg}`;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2500);
}
function updateModuleProgress() {
  const total = LESSONS.length;
  const done = LESSONS.filter(l => APP.done[l.id]).length;
  document.getElementById('mod-fill').style.width = Math.round((done/total)*100) + '%';
  document.getElementById('mod-label').textContent = `${done} / ${total} subtópicos concluídos`;
}
function renderSidebar() {
  const tagLabel = { critical:'crítico', important:'importante', bonus:'bônus' };
  let html = `<div class="sidebar-title">Módulo 03 · Airflow</div>`;
  html += `<div class="toc-item summary-item ${currentLesson===0?'active':''}" onclick="goTo(0)"><span class="toc-num">—</span><span class="toc-text">Visão geral do módulo</span></div>`;
  html += `<div class="toc-divider"></div><div class="sidebar-title">Aulas</div>`;
  LESSONS.forEach((l, i) => {
    const done = !!APP.done[l.id];
    html += `<div class="toc-item ${currentLesson===i+1?'active':''}" onclick="goTo(${i+1})">
      <span class="toc-num">${i+1}</span>
      <span class="toc-check ${done?'done':''}">${done?'✓':''}</span>
      <span class="toc-text">${l.title}</span>
      <span class="toc-tag ${l.tag}">${tagLabel[l.tag]}</span>
    </div>`;
  });
  document.getElementById('sidebar').innerHTML = html;
}
function goTo(idx) { currentLesson = idx; renderSidebar(); renderContent(); window.scrollTo({top:0,behavior:'smooth'}); }
function toggleDone(lessonId) {
  APP.done[lessonId] = !APP.done[lessonId];
  saveData(); updateModuleProgress(); renderSidebar(); renderContent();
  syncToHub();
  showToast(APP.done[lessonId] ? 'Aula marcada como concluída!' : 'Desmarcada', APP.done[lessonId] ? '✅' : '↩️');
}
function syncToHub() {
  try {
    const raw = localStorage.getItem('de_study_local_v2');
    if (!raw) return;
    const hub = JSON.parse(raw);
    LESSONS.forEach((l, i) => { hub.checks[`airflow_${i}`] = !!APP.done[l.id]; });
    localStorage.setItem('de_study_local_v2', JSON.stringify(hub));
  } catch(e) {}
}
function answerQuiz(lessonIdx, chosen) {
  const lesson = LESSONS[lessonIdx];
  const opts = document.querySelectorAll(`#qc-opts-${lesson.id} .qc-opt`);
  if (opts[0].disabled) return;
  opts.forEach((o, i) => {
    o.disabled = true;
    if (i === lesson.quiz.correct) o.classList.add('correct');
    if (i === chosen && chosen !== lesson.quiz.correct) o.classList.add('wrong');
  });
  const ok = chosen === lesson.quiz.correct;
  APP.quizResults[lesson.id] = ok;
  saveData();
  const fb = document.getElementById(`qc-fb-${lesson.id}`);
  fb.textContent = (ok ? '✅ Correto! ' : '❌ Incorreto. ') + lesson.quiz.explanation;
  fb.className = `qc-fb show ${ok ? 'correct' : 'wrong'}`;
}
function exportLessonMD(lessonIdx) {
  const lesson = LESSONS[lessonIdx];
  const md = generateLessonMarkdown(lesson, "Apache Airflow");
  downloadFile(`airflow_aula${lessonIdx+1}_${lesson.id}.md`, md);
  showToast('Markdown exportado! Pronto pro NotebookLM.', '📄');
}
function exportModuleMD() {
  let full = `# Apache Airflow\n\n_Módulo completo — exportado para estudo no NotebookLM_\n\n---\n\n`;
  LESSONS.forEach((l) => {
    full += generateLessonMarkdown(l, "Apache Airflow");
    full += '\n\n---\n\n';
  });
  downloadFile(`airflow_modulo_completo.md`, full);
  showToast('Markdown do módulo completo exportado!', '📄');
}
function renderSummary() {
  let html = `<div style="margin-bottom:20px">
    <h2 style="font-size:20px;margin-bottom:6px">Visão geral — Módulo Apache Airflow</h2>
    <p style="font-size:13px;color:var(--text2);max-width:620px;line-height:1.6">
      Este módulo cobre os 9 subtópicos de Airflow do fundamento (DAGs, Operators) ao avançado
      (TaskFlow API, Sensors deferrable). Você já usa Airflow em produção — o foco aqui é aprofundar
      os conceitos que fazem a diferença em entrevista e em pipelines mais robustos.
    </p>
  </div><div class="summary-grid">`;
  LESSONS.forEach((l, i) => {
    const d = !!APP.done[l.id];
    const q = APP.quizResults[l.id];
    html += `<div class="summary-card" onclick="goTo(${i+1})" style="cursor:pointer">
      <h4>${i+1}. ${l.title} ${d ? '✅' : ''}</h4>
      <p>${l.sub}${q !== undefined ? (q ? ' · Quiz: acertou ✅' : ' · Quiz: errou — revisar 🔴') : ''}</p>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

const VIDEO_FOLDER = 'airflow';
const VIDEO_PREFIX = 'air';

function renderVideoBlock(lesson, lessonNum) {
  if (lesson.video) {
    const src = lesson.video;
    return `<div class="video-wrap">
      <video controls preload="metadata">
        <source src="${encodeURI(src)}" type="video/mp4">
        Seu navegador não suporta vídeo HTML5.
      </video>
    </div>`;
  }
  return `<div class="video-placeholder">
    <div class="vp-icon">🎬</div>
    <div class="vp-title">Vídeo ainda não adicionado</div>
    <div class="vp-sub">Vídeo ainda não adicionado — suba no Blob Storage e cole a URL completa no campo video: desta aula</div>
  </div>`;
}

function renderContent() {
  if (currentLesson === 0) { renderSummary(); return; }
  const lesson = LESSONS[currentLesson - 1];
  const done = !!APP.done[lesson.id];
  const idx = currentLesson - 1;
  const nblmQuestionsHtml = lesson.nblm.questions.map(q => `<li>${q}</li>`).join('');
  document.getElementById('content').innerHTML = `
    <div class="lesson-nav">
      <button class="lesson-nav-btn" onclick="goTo(${currentLesson-1})" ${currentLesson<=1?'disabled':''}>← Anterior</button>
      <span class="lesson-progress-label">Aula ${idx+1} de ${LESSONS.length}</span>
      <button class="lesson-nav-btn" onclick="goTo(${currentLesson+1<=LESSONS.length?currentLesson+1:0})">${currentLesson<LESSONS.length?'Próxima →':'Ver resumo →'}</button>
    </div>
    <div class="lesson-card" id="lesson-print-${lesson.id}">
      <div class="lesson-eyebrow">${lesson.eyebrow}</div>
      <h2 class="lesson-title">${lesson.title}</h2>
      <div class="lesson-sub">${lesson.sub}</div>
      <hr>
      ${renderVideoBlock(lesson, idx+1)}
      ${lesson.body}
      <div class="recap"><div class="rt">Recapitulando</div><ul>${lesson.recap.map(r => `<li>${r}</li>`).join('')}</ul></div>
      <div class="nblm-box">
        <div class="nblm-header">🎙️ Aprofundar no NotebookLM</div>
        <div class="nblm-body">
          <div class="nblm-field"><div class="nblm-label">Assunto do notebook</div><div class="nblm-value">${lesson.nblm.subject}</div></div>
          <div class="nblm-field"><div class="nblm-label">Perguntas-guia para o Audio Overview</div><ul class="nblm-questions">${nblmQuestionsHtml}</ul></div>
          <div class="nblm-field"><div class="nblm-label">Fonte complementar sugerida</div><div class="nblm-value">${lesson.nblm.source}</div></div>
        </div>
      </div>
      <div class="source-box"><strong>Como usar:</strong> exporte esta aula em Markdown, suba no NotebookLM junto com a fonte complementar sugerida, e cole as perguntas-guia no campo de customização do Audio Overview.</div>
    </div>
    <div class="mark-bar">
      <button class="mark-check-btn" onclick="toggleDone('${lesson.id}')"><span class="box ${done?'done':''}">${done?'✓':''}</span>Marcar esta aula como concluída</button>
      <button class="hdr-btn primary" onclick="exportLessonMD(${idx})">⬇ Exportar esta aula (.md)</button>
    </div>
    <div class="quick-check">
      <div class="qc-title">🧪 Teste rápido de fixação</div>
      <div class="qc-q">${lesson.quiz.q}</div>
      ${lesson.quiz.code ? `<div class="test-code">${lesson.quiz.code}</div>` : ''}
      <div class="qc-opts" id="qc-opts-${lesson.id}">${lesson.quiz.options.map((o,i) => `<button class="qc-opt" onclick="answerQuiz(${idx},${i})">${o}</button>`).join('')}</div>
      <div class="qc-fb" id="qc-fb-${lesson.id}"></div>
    </div>
  `;
}
updateModuleProgress();
renderSidebar();
renderContent();
initUserName();
</script>
<input type="file" id="import-file-input" accept=".json" style="display:none" onchange="handleImportFile(event)">
</body>
</html>
