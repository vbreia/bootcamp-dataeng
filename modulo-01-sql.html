    <h2>Bem-vindo ao seu sistema de estudos!</h2>
    <p>Como você se chama?</p>
    <input type="text" id="name-input" placeholder="Seu nome" maxlength="40" autocomplete="off" onkeydown="handleNameKeydown(event)">
    <button onclick="saveUserName()">Começar</button>
  </div>
</div>

<script>
// ─── Nome do usuário ─────────────────────────────────────────────────────
function initUserName() {
  const name = localStorage.getItem('de_user_name');
  if (name) {
    updateGreeting(name.split(' ')[0]);
  } else {
    document.getElementById('name-modal').style.display = 'flex';
    document.getElementById('name-input').focus();
  }
}

function openNameModal() {
  const input = document.getElementById('name-input');
  input.value = localStorage.getItem('de_user_name') || '';
  document.getElementById('name-modal').style.display = 'flex';
  input.focus();
  input.select();
}

function saveUserName() {
  const input = document.getElementById('name-input');
  const name = input.value.trim();
  if (!name) {
    input.style.borderColor = 'var(--red)';
    input.focus();
    return;
  }
  input.style.borderColor = '';
  const firstName = name.split(' ')[0];
  localStorage.setItem('de_user_name', name);
  document.getElementById('name-modal').style.display = 'none';
  updateGreeting(firstName);
}

function updateGreeting(name) {
  const el = document.getElementById('user-greeting');
  if (el) {
    el.innerHTML = `Olá, <strong>${name}</strong>! <a class="user-edit" onclick="openNameModal()">editar nome</a>`;
  }
}

function handleNameKeydown(e) {
  if (e.key === 'Enter') saveUserName();
}

const STORAGE_KEY = 'de_module_sql_v1';

// ─── Backup completo (todas as chaves) ────────────────────────────────────
const BACKUP_KEYS = [
  'de_user_name',
  'de_study_local_v2',
  'de_module_sql_v1',
  'de_module_modelagem_v1',
  'de_module_airflow_v1',
  'de_module_python_v1',
  'de_module_cloud_v1',
  'de_module_processos_v1'
];

function exportBackup() {
  const data = {};
  BACKUP_KEYS.forEach(function(key) {
    const val = localStorage.getItem(key);
    if (val !== null) data[key] = val;
  });
  const name = (localStorage.getItem('de_user_name') || 'usuario').split(' ')[0]
    .toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
  const date = new Date().toISOString().split('T')[0];
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'bootcamp-etransparente-backup-' + name + '-' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup exportado!', '⬇');
}

function importBackup() {
  document.getElementById('import-file-input').click();
}

function handleImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      let count = 0;
      BACKUP_KEYS.forEach(function(key) {
        if (data[key] !== undefined) {
          localStorage.setItem(key, data[key]);
          count++;
        }
      });
      if (count === 0) {
        showToast('Erro: nenhuma chave reconhecida no arquivo.', '❌');
        return;
      }
      showToast(count + ' dados importados! Recarregando...', '✅');
      setTimeout(function() { location.reload(); }, 1500);
    } catch (err) {
      showToast('Erro: arquivo invalido. Verifique o JSON.', '❌');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

const LESSONS = [
{
  id: 'basico', tag: 'owned',
  video: 'https://etransparentebootcamp.blob.core.windows.net/videos/sql/sql1.L%C3%B3gica_de_Execu%C3%A7%C3%A3o_SQL.mp4',
  title: 'SELECT, WHERE, GROUP BY, ORDER BY',
  eyebrow: 'Aula 1 de 9 · Fundamentos',
  sub: 'A gramática básica de qualquer consulta — e os detalhes que a maioria ignora',
  body: `
<p>Toda query SQL, por mais complexa que fique depois, nasce de quatro cláusulas: <code>SELECT</code> (o que eu quero ver), <code>FROM</code> (de onde), <code>WHERE</code> (quais linhas) e <code>ORDER BY</code> (em que ordem). Parece trivial, mas a ordem lógica de execução dessas cláusulas — que é diferente da ordem em que você as escreve — é a base para entender praticamente todo erro estranho que você vai encontrar em SQL mais complexo depois.</p>
<h3>A ordem real de execução</h3>
<p>Você escreve <code>SELECT ... FROM ... WHERE ... GROUP BY ... HAVING ... ORDER BY</code>, mas o banco de dados processa nessa ordem: <strong>FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY</strong>. Isso explica por que você não pode usar um alias definido no SELECT dentro do WHERE — o WHERE roda antes do SELECT existir.</p>
<pre><code>-- Isso NÃO funciona na maioria dos bancos:
SELECT preco * 1.1 AS preco_com_taxa
FROM produtos
WHERE preco_com_taxa > 100;  -- erro: preco_com_taxa ainda não existe aqui

-- Isso funciona:
SELECT preco * 1.1 AS preco_com_taxa
FROM produtos
WHERE preco * 1.1 > 100;</code></pre>
<h3>WHERE vs HAVING — a confusão mais comum</h3>
<p><code>WHERE</code> filtra linhas <em>antes</em> do agrupamento. <code>HAVING</code> filtra grupos <em>depois</em> do agrupamento — por isso só faz sentido usá-lo junto de <code>GROUP BY</code>, e é o único lugar onde você pode filtrar por uma função de agregação como <code>COUNT()</code> ou <code>SUM()</code>.</p>
<pre><code>SELECT regiao, COUNT(*) AS total_clientes
FROM clientes
WHERE ativo = true
GROUP BY regiao
HAVING COUNT(*) > 100;</code></pre>
<div class="callout warn">⚠️ Um erro clássico de iniciante: tentar escrever <code>WHERE COUNT(*) > 100</code>. Isso sempre falha, porque no momento em que o WHERE é processado, a agregação ainda não existe.</div>
<h3>GROUP BY — a regra que ninguém explica direito</h3>
<p>Toda coluna que aparece no SELECT e <strong>não</strong> está dentro de uma função de agregação precisa estar no GROUP BY. Bancos como PostgreSQL são rígidos com essa regra e recusam a query; o MySQL em modo não-estrito pode "deixar passar", retornando um valor arbitrário — o que costuma gerar bugs silenciosos.</p>
<pre><code>-- Correto
SELECT cidade, COUNT(*) FROM clientes GROUP BY cidade;

-- Incorreto em bancos rígidos: 'nome' não está agregado nem no GROUP BY
SELECT cidade, nome, COUNT(*) FROM clientes GROUP BY cidade;</code></pre>
<h3>ORDER BY — nulls e múltiplas colunas</h3>
<p>Por padrão no PostgreSQL, valores <code>NULL</code> são ordenados por último em ordem ascendente — mas isso varia entre bancos, então especifique explicitamente quando o comportamento de NULL importa:</p>
<pre><code>SELECT nome, data_ultimo_pedido
FROM clientes
ORDER BY data_ultimo_pedido DESC NULLS LAST;</code></pre>
<p>Ordenar por múltiplas colunas funciona como um desempate em cascata:</p>
<pre><code>SELECT * FROM funcionarios
ORDER BY departamento ASC, salario DESC;</code></pre>
<h3>DISTINCT — remoção de duplicatas</h3>
<p><code>DISTINCT</code> remove linhas totalmente duplicadas. Quando aplicado a múltiplas colunas, considera a <em>combinação</em> delas, não cada uma isoladamente.</p>
<pre><code>SELECT DISTINCT cidade, estado FROM clientes;</code></pre>

  GROUP BY c.nome
),

<h3>Seq Scan vs Index Scan</h3>
<p><strong>Seq Scan</strong> lê a tabela inteira. <strong>Index Scan</strong> usa um índice para pular direto às linhas relevantes. Seq Scan em tabela grande onde se esperava índice é o sinal mais comum de otimização faltando.</p>

function htmlToMarkdown(html) {
  let md = html;
  md = md.replace(/<div class="callout[^"]*">\s*([\s\S]*?)\s*<\/div>/g, (m, p1) => '> ' + p1.replace(/<[^>]+>/g,'').trim() + '\n\n');
  md = md.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, (m, p1) => '```sql\n' + p1.trim() + '\n```\n\n');
  md = md.replace(/<h3>(.*?)<\/h3>/g, '\n### $1\n\n');
  md = md.replace(/<h4>(.*?)<\/h4>/g, '\n#### $1\n\n');
  md = md.replace(/<hr>/g, '\n---\n\n');
  md = md.replace(/<ul>/g, '\n').replace(/<\/ul>/g, '\n');
  md = md.replace(/<li>\s*([\s\S]*?)\s*<\/li>/g, '- $1\n');
  md = md.replace(/<p>\s*([\s\S]*?)\s*<\/p>/g, '$1\n\n');
  md = md.replace(/<strong>(.*?)<\/strong>/g, '**$1**');
  md = md.replace(/<em>(.*?)<\/em>/g, '_$1_');
  md = md.replace(/<code>(.*?)<\/code>/g, '`$1`');
  md = md.replace(/<[^>]+>/g, '');
  md = md.replace(/\n{3,}/g, '\n\n');
  return md.trim();
}

function generateLessonMarkdown(lesson, moduleTitle) {
  let md = `# ${lesson.title}\n\n`;
  md += `_${lesson.eyebrow} — ${moduleTitle}_\n\n`;
  md += `> ${lesson.sub}\n\n`;
  md += '---\n\n';
  md += htmlToMarkdown(lesson.body);
  md += '\n\n## Recapitulando\n\n';
  lesson.recap.forEach(r => md += `- ${r}\n`);
  md += '\n## Aprofundar no NotebookLM\n\n';
  md += `**Assunto do notebook:** ${lesson.nblm.subject}\n\n`;
  md += `**Perguntas-guia para o Audio Overview:**\n\n`;
  lesson.nblm.questions.forEach(q => md += `- ${q}\n`);
  md += `\n**Fonte complementar sugerida:** ${lesson.nblm.source}\n\n`;
  md += '---\n\n';
  md += `**Teste rápido:** ${lesson.quiz.q}\n\n`;
  lesson.quiz.options.forEach((o,i) => md += `${i === lesson.quiz.correct ? '- [x]' : '- [ ]'} ${o}\n`);
  md += `\n> **Explicação:** ${lesson.quiz.explanation}\n`;
  return md;
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function answerQuiz(lessonIdx, chosen) {
  const lesson = LESSONS[lessonIdx];

  opts.forEach((o, i) => {
    o.disabled = true;
    if (i === lesson.quiz.correct) o.classList.add('correct');
    if (i === chosen && chosen !== lesson.quiz.correct) o.classList.add('wrong');
  });
  const ok = chosen === lesson.quiz.correct;
  APP.quizResults[lesson.id] = ok;
  saveData();
  const fb = document.getElementById(`qc-fb-${lesson.id}`);
  fb.textContent = (ok ? '✅ Correto! ' : '❌ Incorreto. ') + lesson.quiz.explanation;
