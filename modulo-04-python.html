<script>
// ─── Nome do usuário ─────────────────────────────────────────────────────
function initUserName() {
  const name = localStorage.getItem('de_user_name');
  if (name) {
    updateGreeting(name.split(' ')[0]);
  } else {
    document.getElementById('name-modal').style.display = 'flex';
    document.getElementById('name-input').focus();
  }
}

function openNameModal() {
  const input = document.getElementById('name-input');
  input.value = localStorage.getItem('de_user_name') || '';
  document.getElementById('name-modal').style.display = 'flex';
  input.focus();
  input.select();
}

function saveUserName() {
  const input = document.getElementById('name-input');
  const name = input.value.trim();
  if (!name) {
    input.style.borderColor = 'var(--red)';
    input.focus();
    return;
  }
  input.style.borderColor = '';
  const firstName = name.split(' ')[0];
  localStorage.setItem('de_user_name', name);
  document.getElementById('name-modal').style.display = 'none';
  updateGreeting(firstName);
}

function updateGreeting(name) {
  const el = document.getElementById('user-greeting');
  if (el) {
    el.innerHTML = `Olá, <strong>${name}</strong>! <a class="user-edit" onclick="openNameModal()">editar nome</a>`;
  }
}

function handleNameKeydown(e) {
  if (e.key === 'Enter') saveUserName();
}

const STORAGE_KEY = 'de_module_python_v1';

// ─── Backup completo (todas as chaves) ────────────────────────────────────
const BACKUP_KEYS = [
  'de_user_name',
  'de_study_local_v2',
  'de_module_sql_v1',
  'de_module_modelagem_v1',
  'de_module_airflow_v1',
  'de_module_python_v1',
  'de_module_cloud_v1',
  'de_module_processos_v1'
];

function exportBackup() {
  const data = {};
  BACKUP_KEYS.forEach(function(key) {
    const val = localStorage.getItem(key);
    if (val !== null) data[key] = val;
  });
  const name = (localStorage.getItem('de_user_name') || 'usuario').split(' ')[0]
    .toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
  const date = new Date().toISOString().split('T')[0];
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'bootcamp-etransparente-backup-' + name + '-' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup exportado!', '⬇');
}

function importBackup() {
  document.getElementById('import-file-input').click();
}

function handleImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      let count = 0;
      BACKUP_KEYS.forEach(function(key) {
        if (data[key] !== undefined) {
          localStorage.setItem(key, data[key]);
          count++;
        }
      });
      if (count === 0) {
        showToast('Erro: nenhuma chave reconhecida no arquivo.', '❌');
        return;
      }
      showToast(count + ' dados importados! Recarregando...', '✅');
      setTimeout(function() { location.reload(); }, 1500);
    } catch (err) {
      showToast('Erro: arquivo invalido. Verifique o JSON.', '❌');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

const LESSONS = [
{
  id: 'io', tag: 'owned',
  video: 'https://etransparentebootcamp.blob.core.windows.net/videos/python/python1.Fundamentos_de_I_O_em_Pandas.mp4',
  title: 'Pandas — leitura/escrita (CSV, JSON, Parquet)',
  eyebrow: 'Aula 1 de 9 · Fundamentos',
  sub: 'A porta de entrada e saída de qualquer pipeline de dados em Python',
  body: `
<p>Pandas abstrai a leitura e escrita de praticamente qualquer formato tabular com uma interface consistente: <code>pd.read_X()</code> para entrada, <code>df.to_X()</code> para saída. Entender as diferenças entre os formatos mais comuns — e quando usar cada um — é uma decisão de design que aparece constantemente em pipelines reais.</p>
<h3>CSV — o formato universal, mas limitado</h3>
<pre><code>import pandas as pd

df = pd.read_csv('dados.csv')
df.to_csv('saida.csv', index=False)</code></pre>
<p>CSV é legível por humanos e aberto por qualquer ferramenta, mas não guarda informação de tipo — tudo é lido como texto e o Pandas precisa inferir tipos numéricos, datas, etc. Isso pode gerar surpresas: uma coluna de CEP como "01310-100" pode virar número e perder o zero à esquerda se não for tratada como string explicitamente.</p>
<pre><code>df = pd.read_csv('dados.csv', dtype={'cep': str})</code></pre>
<h3>JSON — bom para dados semi-estruturados</h3>
<pre><code>df = pd.read_json('dados.json')
df.to_json('saida.json', orient='records', force_ascii=False)</code></pre>
<p>JSON lida naturalmente com estruturas aninhadas (listas dentro de campos, dicionários dentro de dicionários) — comum em respostas de APIs. Para "achatar" estruturas aninhadas em colunas planas, <code>pd.json_normalize()</code> é a ferramenta certa:</p>
<pre><code>import json
with open('resposta_api.json') as f:
    dados = json.load(f)
df = pd.json_normalize(dados, record_path=['pedidos'], meta=['cliente_id'])</code></pre>
<h3>Parquet — o formato de produção</h3>
<pre><code>df.to_parquet('saida.parquet', index=False)
df = pd.read_parquet('dados.parquet')</code></pre>
<div class="callout tip">💡 Parquet é colunar (armazena dados por coluna, não por linha), comprimido, e guarda schema/tipos junto com os dados. Isso o torna dramaticamente mais rápido para leitura seletiva de colunas em tabelas largas, e elimina os problemas de inferência de tipo do CSV — é o formato padrão nas camadas Silver e Gold de arquiteturas Medallion.</div>
<h3>Lendo apenas parte de um arquivo grande</h3>
<p>Para CSVs muito grandes que não cabem inteiros em memória, <code>chunksize</code> permite processar em blocos:</p>
<pre><code>for chunk in pd.read_csv('arquivo_grande.csv', chunksize=100_000):
    processar(chunk)</code></pre>
<p>Parquet, por ser colunar, já permite ler apenas as colunas necessárias sem carregar o arquivo inteiro:</p>
<pre><code>df = pd.read_parquet('dados.parquet', columns=['id', 'valor'])</code></pre>
<h3>Encoding — o erro silencioso mais comum com dados brasileiros</h3>
<div class="callout warn">⚠️ Arquivos CSV com acentuação (nomes de cidades, categorias em português) frequentemente vêm em encoding <code>latin-1</code> (ISO-8859-1) em vez de <code>UTF-8</code>, especialmente quando exportados de sistemas legados ou Excel. Isso gera caracteres corrompidos ("São Paulo" virando "SÃ£o Paulo") em vez de erro explícito, o que torna o problema mais traiçoeiro.</div>

<p>Em pipelines de produção, <code>print()</code> não é suficiente — você precisa de níveis de severidade, timestamps, e rastreabilidade de onde cada mensagem veio. O módulo <code>logging</code> da biblioteca padrão do Python resolve isso de forma estruturada.</p>
<h3>Configuração básica</h3>
<pre><code>import logging

logging.basicConfig(
    level=logging.INFO,
    format='%(asctime)s - %(name)s - %(levelname)s - %(message)s'
)

logger.info("Iniciando processamento")
logger.warning("Taxa de nulos acima do esperado: 15%")
logger.error("Falha ao conectar com a API")</code></pre>
<h3>Os níveis de severidade e quando usar cada um</h3>
<ul>
  <li><strong>DEBUG</strong> — detalhes técnicos úteis só durante desenvolvimento/depuração.</li>
  <li><strong>INFO</strong> — marcos normais de execução ("iniciando extração", "processadas 500 linhas").</li>
  <li><strong>WARNING</strong> — algo inesperado, mas que não impede a execução de continuar (ex: taxa de nulos alta).</li>
  <li><strong>ERROR</strong> — uma falha que impede aquela operação específica de completar.</li>
  <li><strong>CRITICAL</strong> — falha grave que compromete a aplicação inteira.</li>
</ul>
<div class="callout tip">💡 Configurar <code>level=logging.INFO</code> em produção (em vez de DEBUG) filtra o ruído, mostrando só o que realmente importa para acompanhar a execução — mas mantém a possibilidade de trocar para DEBUG temporariamente ao investigar um problema específico.</div>

  body: `
<p>NumPy é a biblioteca de computação numérica que serve de fundação para o Pandas — quando uma coluna do Pandas armazena números, ela internamente é um array NumPy. Entender operações básicas de NumPy ajuda a escrever transformações mais rápidas e a entender por que certas operações do Pandas se comportam do jeito que se comportam.</p>
<h3>Arrays vs listas Python — por que a diferença importa</h3>
<pre><code>import numpy as np

precos = np.array([100, 200, 150, 300])
precos_com_desconto = precos * 0.9  # operação vetorizada, aplica a TODOS os elementos
</code></pre>
<p>Em uma lista Python comum, multiplicar por 0.9 exigiria um loop explícito ou list comprehension. Em um array NumPy, a operação é vetorizada — aplicada a todos os elementos de uma vez, em código otimizado, sem loop explícito em Python.</p>
<h3>np.where — condicional vetorizado</h3>
<pre><code>categorias = np.where(precos > 150, 'Caro', 'Barato')
# array(['Barato', 'Caro', 'Barato', 'Caro'])</code></pre>
<p><code>np.where(condição, valor_se_verdadeiro, valor_se_falso)</code> é o equivalente vetorizado de um if/else aplicado elemento a elemento — muito mais rápido que <code>apply</code> com uma função condicional, como visto na Aula 3.</p>
<h3>np.select — múltiplas condições</h3>
<pre><code>condicoes = [precos > 250, precos > 150]
resultados = ['Premium', 'Médio']
categorias = np.select(condicoes, resultados, default='Básico')</code></pre>
<h3>Funções estatísticas vetorizadas</h3>
<pre><code>np.mean(precos)
np.median(precos)
np.std(precos)     # desvio padrão
np.percentile(precos, 90)   # percentil 90</code></pre>
<p>Essas mesmas operações existem como métodos do Pandas (<code>df['coluna'].mean()</code>), porque o Pandas usa NumPy por baixo — mas entender que a implementação vem do NumPy ajuda a entender por que Pandas é rápido em operações numéricas e lento em operações que exigem iteração linha a linha em Python puro.</p>
<h3>NaN em NumPy — um detalhe que gera confusão</h3>
<div class="callout warn">⚠️ <code>np.nan</code> nunca é igual a si mesmo — <code>np.nan == np.nan</code> retorna <code>False</code>. Para checar se um valor é nulo, sempre use <code>np.isnan()</code> ou o equivalente do Pandas (<code>pd.isnull()</code>), nunca uma comparação de igualdade direta.</p>
<h3>Broadcasting — operações entre arrays de tamanhos diferentes</h3>
<pre><code>matriz = np.array([[1, 2, 3], [4, 5, 6]])
matriz + np.array([10, 20, 30])
# soma [10, 20, 30] a CADA linha da matriz automaticamente</code></pre>
<p>Broadcasting é o mecanismo que permite ao NumPy aplicar operações entre arrays de dimensões diferentes de forma automática, seguindo regras específicas de compatibilidade — é um conceito mais avançado, mas explica comportamentos que parecem "mágicos" à primeira vista em operações entre uma coluna do Pandas (1 dimensão) e um valor escalar.</p>

  id: 'pyspark', tag: 'bonus',

  body: `
<p>PySpark é a interface Python para o Apache Spark, um framework de processamento distribuído de dados. Diferente do Pandas — que processa dados inteiramente na memória de uma única máquina — o Spark distribui o processamento entre múltiplas máquinas (um cluster), permitindo lidar com volumes que não caberiam na memória de um único computador.</p>
<h3>Quando Pandas deixa de ser suficiente</h3>
<p>Como regra prática: enquanto o dado cabe confortavelmente na memória RAM disponível (geralmente até alguns gigabytes, dependendo da máquina), Pandas é mais simples e rápido de usar. Quando o volume cresce para dezenas ou centenas de gigabytes — ou mais — processamento distribuído se torna necessário, e é aí que Spark entra.</p>
<h3>RDD — a estrutura original e de baixo nível</h3>
<p>RDD (Resilient Distributed Dataset) foi a abstração original do Spark: uma coleção distribuída e imutável de objetos, particionada entre os nós do cluster. Operações em RDD são baseadas em transformações funcionais (<code>map</code>, <code>filter</code>, <code>reduce</code>):</p>
<pre><code>rdd = sc.textFile("dados.txt")
palavras = rdd.flatMap(lambda linha: linha.split(" "))
contagem = palavras.map(lambda p: (p, 1)).reduceByKey(lambda a, b: a + b)</code></pre>
<div class="callout warn">⚠️ RDDs são de baixo nível — você controla exatamente como a computação acontece, mas o Spark não consegue otimizar automaticamente o plano de execução, porque não entende a estrutura (schema) dos dados, só objetos genéricos.</div>
<h3>DataFrame — a abstração moderna e recomendada</h3>
<p>DataFrames no Spark trazem uma estrutura tabular com schema explícito (nomes e tipos de coluna), similar a um DataFrame do Pandas ou uma tabela SQL — e, crucialmente, permitem que o Spark otimize automaticamente o plano de execução através do Catalyst Optimizer.</p>
<pre><code>df = spark.read.parquet("s3://bucket/dados/")
df_filtrado = df.filter(df.valor > 1000).groupBy("categoria").sum("valor")
df_filtrado.show()</code></pre>
<div class="callout tip">💡 Para a esmagadora maioria dos casos de uso modernos, a documentação e a comunidade Spark recomendam DataFrames (ou a API SQL equivalente) em vez de RDDs diretamente — RDDs continuam existindo, mas como uma camada de baixo nível usada internamente ou para casos muito específicos que fogem do modelo tabular.</p>
<h3>Sintaxe familiar para quem já sabe Pandas e SQL</h3>
<pre><code>-- Sintaxe estilo DataFrame
df.select("nome", "valor").filter(df.valor > 100)

-- Sintaxe SQL equivalente, direto no Spark
df.createOrReplaceTempView("tabela")
spark.sql("SELECT nome, valor FROM tabela WHERE valor > 100")</code></pre>
<p>Essa familiaridade é intencional — quem já domina Pandas e SQL (como você) tem uma curva de aprendizado relativamente suave para migrar para PySpark quando o volume de dados exigir.</p>
<h3>Lazy evaluation — uma diferença conceitual importante</h3>
<p>Operações em DataFrames Spark são "preguiçosas" (lazy): escrever <code>df.filter(...).groupBy(...)</code> não executa nada imediatamente — o Spark constrói um plano de execução e só processa de fato quando uma "ação" é chamada (como <code>.show()</code>, <code>.collect()</code>, ou salvar em disco). Isso permite ao Catalyst Optimizer analisar a cadeia inteira de transformações antes de decidir a forma mais eficiente de executá-la.</p>
<h3>Por que isso vale a pena conhecer mesmo sem usar ainda</h3>
<p>Mencionar que você entende a diferença conceitual entre RDD e DataFrame — e por que DataFrames são preferidos hoje — demonstra que você acompanha a evolução do ecossistema de processamento de dados, mesmo que seu dia a dia atual seja com Pandas em volumes menores.</p>

    options: ['Porque RDDs foram descontinuados e não funcionam mais', 'Porque DataFrames têm schema explícito, o que permite ao Spark otimizar automaticamente o plano de execução via Catalyst Optimizer', 'Porque RDDs só funcionam com dados em formato texto', 'Não há diferença prática relevante entre os dois'],
    correct: 1,
    explanation: 'RDDs operam sobre objetos genéricos sem que o Spark saiba sua estrutura interna, impedindo otimizações automáticas. DataFrames têm schema explícito (nomes e tipos de coluna), permitindo que o Catalyst Optimizer analise e otimize o plano de execução antes de rodar, de forma similar a um otimizador de banco de dados relacional.'
  }
}
];

function htmlToMarkdown(html) {
  let md = html;
  md = md.replace(/<div class="callout[^"]*">\s*([\s\S]*?)\s*<\/div>/g, (m, p1) => '> ' + p1.replace(/<[^>]+>/g,'').trim() + '\n\n');
  md = md.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, (m, p1) => '```python\n' + p1.trim() + '\n```\n\n');
  md = md.replace(/<h3>(.*?)<\/h3>/g, '\n### $1\n\n');
  md = md.replace(/<h4>(.*?)<\/h4>/g, '\n#### $1\n\n');
  md = md.replace(/<hr>/g, '\n---\n\n');
  md = md.replace(/<ul>/g, '\n').replace(/<\/ul>/g, '\n');
  md = md.replace(/<li>\s*([\s\S]*?)\s*<\/li>/g, '- $1\n');
  md = md.replace(/<p>\s*([\s\S]*?)\s*<\/p>/g, '$1\n\n');
  md = md.replace(/<strong>(.*?)<\/strong>/g, '**$1**');
  md = md.replace(/<em>(.*?)<\/em>/g, '_$1_');
  md = md.replace(/<code>(.*?)<\/code>/g, '`$1`');
  md = md.replace(/<[^>]+>/g, '');
  md = md.replace(/\n{3,}/g, '\n\n');
  return md.trim();
}

function generateLessonMarkdown(lesson, moduleTitle) {
  let md = `# ${lesson.title}\n\n`;
  md += `_${lesson.eyebrow} — ${moduleTitle}_\n\n`;
  md += `> ${lesson.sub}\n\n`;
  md += '---\n\n';
  md += htmlToMarkdown(lesson.body);
  md += '\n\n## Recapitulando\n\n';
  lesson.recap.forEach(r => md += `- ${r}\n`);
  md += '\n## Aprofundar no NotebookLM\n\n';
  md += `**Assunto do notebook:** ${lesson.nblm.subject}\n\n`;
  md += `**Perguntas-guia para o Audio Overview:**\n\n`;
  lesson.nblm.questions.forEach(q => md += `- ${q}\n`);
  md += `\n**Fonte complementar sugerida:** ${lesson.nblm.source}\n\n`;
  md += '---\n\n';
  md += `**Teste rápido:** ${lesson.quiz.q}\n\n`;
  lesson.quiz.options.forEach((o,i) => md += `${i === lesson.quiz.correct ? '- [x]' : '- [ ]'} ${o}\n`);
  md += `\n> **Explicação:** ${lesson.quiz.explanation}\n`;
  return md;
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function loadData() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch(e){}
  return { done: {}, quizResults: {} };
}
function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(APP)); } catch(e){} }
let APP = loadData();
let currentLesson = 0;
function showToast(msg, emoji='✅') {
  const t = document.getElementById('toast');
  t.innerHTML = `${emoji} ${msg}`;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2500);
}
function updateModuleProgress() {
  const total = LESSONS.length;
  const done = LESSONS.filter(l => APP.done[l.id]).length;
  document.getElementById('mod-fill').style.width = Math.round((done/total)*100) + '%';
  document.getElementById('mod-label').textContent = `${done} / ${total} subtópicos concluídos`;
}
function renderSidebar() {
  const tagLabel = { critical:'crítico', important:'importante', bonus:'bônus', owned:'tenho' };
  let html = `<div class="sidebar-title">Módulo 04 · Python</div>`;
  html += `<div class="toc-item summary-item ${currentLesson===0?'active':''}" onclick="goTo(0)"><span class="toc-num">—</span><span class="toc-text">Visão geral do módulo</span></div>`;
  html += `<div class="toc-divider"></div><div class="sidebar-title">Aulas</div>`;
  LESSONS.forEach((l, i) => {
    const done = !!APP.done[l.id];
    html += `<div class="toc-item ${currentLesson===i+1?'active':''}" onclick="goTo(${i+1})">
      <span class="toc-num">${i+1}</span>
      <span class="toc-check ${done?'done':''}">${done?'✓':''}</span>
      <span class="toc-text">${l.title}</span>
      <span class="toc-tag ${l.tag}">${tagLabel[l.tag]}</span>
    </div>`;
  });
  document.getElementById('sidebar').innerHTML = html;
}
function goTo(idx) { currentLesson = idx; renderSidebar(); renderContent(); window.scrollTo({top:0,behavior:'smooth'}); }
function toggleDone(lessonId) {
  APP.done[lessonId] = !APP.done[lessonId];
  saveData(); updateModuleProgress(); renderSidebar(); renderContent();
  showToast(APP.done[lessonId] ? 'Aula marcada como concluída!' : 'Desmarcada', APP.done[lessonId] ? '✅' : '↩️');
}
function answerQuiz(lessonIdx, chosen) {
  const lesson = LESSONS[lessonIdx];
  const opts = document.querySelectorAll(`#qc-opts-${lesson.id} .qc-opt`);
  if (opts[0].disabled) return;
  opts.forEach((o, i) => {
    o.disabled = true;
    if (i === lesson.quiz.correct) o.classList.add('correct');
    if (i === chosen && chosen !== lesson.quiz.correct) o.classList.add('wrong');
  });
  const ok = chosen === lesson.quiz.correct;
  APP.quizResults[lesson.id] = ok;
  saveData();
  const fb = document.getElementById(`qc-fb-${lesson.id}`);
  fb.textContent = (ok ? '✅ Correto! ' : '❌ Incorreto. ') + lesson.quiz.explanation;
  fb.className = `qc-fb show ${ok ? 'correct' : 'wrong'}`;
}
function exportLessonMD(lessonIdx) {
  const lesson = LESSONS[lessonIdx];
  const md = generateLessonMarkdown(lesson, "Python para Dados");
  downloadFile(`python_aula${lessonIdx+1}_${lesson.id}_victor_breia.md`, md);
  showToast('Markdown exportado! Pronto pro NotebookLM.', '📄');
}
function exportModuleMD() {
  let full = `# Python para Dados\n\n_Módulo completo — exportado para estudo no NotebookLM_\n\n---\n\n`;
  LESSONS.forEach((l) => {
    full += generateLessonMarkdown(l, "Python para Dados");
    full += '\n\n---\n\n';
  });
  downloadFile(`python_modulo_completo_victor_breia.md`, full);
  showToast('Markdown do módulo completo exportado!', '📄');
}
function renderSummary() {
  let html = `<div style="margin-bottom:20px">
    <h2 style="font-size:20px;margin-bottom:6px">Visão geral — Módulo Python para Dados</h2>
    <p style="font-size:13px;color:var(--text2);max-width:620px;line-height:1.6">
      Este módulo cobre os 9 subtópicos de Python aplicado a dados — Pandas, tratamento de qualidade,
      integração com APIs, e uma introdução a PySpark para quando o volume ultrapassa uma única máquina.
      Cada aula tem conteúdo completo, teste de fixação, e seção pronta para o NotebookLM.
    </p>
  </div><div class="summary-grid">`;
  LESSONS.forEach((l, i) => {
    const d = !!APP.done[l.id];
    const q = APP.quizResults[l.id];
    html += `<div class="summary-card" onclick="goTo(${i+1})" style="cursor:pointer">
      <h4>${i+1}. ${l.title} ${d ? '✅' : ''}</h4>
      <p>${l.sub}${q !== undefined ? (q ? ' · Quiz: acertou ✅' : ' · Quiz: errou — revisar 🔴') : ''}</p>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

const VIDEO_FOLDER = 'python';
const VIDEO_PREFIX = 'python';

function renderVideoBlock(lesson, lessonNum) {
  if (lesson.video) {
    const src = decodeURI(lesson.video);
    return `<div class="video-wrap">
      <video controls preload="metadata">
        <source src="${encodeURI(src)}" type="video/mp4">
        Seu navegador não suporta vídeo HTML5.
      </video>
    </div>`;
  }
  return `<div class="video-placeholder">
    <div class="vp-icon">🎬</div>
    <div class="vp-title">Vídeo ainda não adicionado</div>
    <div class="vp-sub">Salve como ${VIDEO_FOLDER}/${VIDEO_PREFIX}${lessonNum}.Titulo_Do_Video.mp4</div>
  </div>`;
}

function renderContent() {
  if (currentLesson === 0) { renderSummary(); return; }
  const lesson = LESSONS[currentLesson - 1];
  const done = !!APP.done[lesson.id];
  const idx = currentLesson - 1;
  const nblmQuestionsHtml = lesson.nblm.questions.map(q => `<li>${q}</li>`).join('');
  document.getElementById('content').innerHTML = `
    <div class="lesson-nav">
      <button class="lesson-nav-btn" onclick="goTo(${currentLesson-1})" ${currentLesson<=1?'disabled':''}>← Anterior</button>
      <span class="lesson-progress-label">Aula ${idx+1} de ${LESSONS.length}</span>
      <button class="lesson-nav-btn" onclick="goTo(${currentLesson+1<=LESSONS.length?currentLesson+1:0})">${currentLesson<LESSONS.length?'Próxima →':'Ver resumo →'}</button>
    </div>
    <div class="lesson-card" id="lesson-print-${lesson.id}">
      <div class="lesson-eyebrow">${lesson.eyebrow}</div>
      <h2 class="lesson-title">${lesson.title}</h2>
      <div class="lesson-sub">${lesson.sub}</div>
      <hr>
      ${renderVideoBlock(lesson, idx+1)}
      ${lesson.body}
      <div class="recap"><div class="rt">Recapitulando</div><ul>${lesson.recap.map(r => `<li>${r}</li>`).join('')}</ul></div>
      <div class="nblm-box">
        <div class="nblm-header">🎙️ Aprofundar no NotebookLM</div>
        <div class="nblm-body">
          <div class="nblm-field"><div class="nblm-label">Assunto do notebook</div><div class="nblm-value">${lesson.nblm.subject}</div></div>
          <div class="nblm-field"><div class="nblm-label">Perguntas-guia para o Audio Overview</div><ul class="nblm-questions">${nblmQuestionsHtml}</ul></div>
          <div class="nblm-field"><div class="nblm-label">Fonte complementar sugerida</div><div class="nblm-value">${lesson.nblm.source}</div></div>
        </div>
      </div>
      <div class="source-box"><strong>Como usar:</strong> exporte esta aula em Markdown, suba no NotebookLM junto com a fonte complementar sugerida, e cole as perguntas-guia no campo de customização do Audio Overview.</div>
    </div>
    <div class="mark-bar">
      <button class="mark-check-btn" onclick="toggleDone('${lesson.id}')"><span class="box ${done?'done':''}">${done?'✓':''}</span>Marcar esta aula como concluída</button>
      <button class="hdr-btn primary" onclick="exportLessonMD(${idx})">⬇ Exportar esta aula (.md)</button>
    </div>
    <div class="quick-check">
      <div class="qc-title">🧪 Teste rápido de fixação</div>
      <div class="qc-q">${lesson.quiz.q}</div>
      ${lesson.quiz.code ? `<div class="test-code">${lesson.quiz.code}</div>` : ''}
      <div class="qc-opts" id="qc-opts-${lesson.id}">${lesson.quiz.options.map((o,i) => `<button class="qc-opt" onclick="answerQuiz(${idx},${i})">${o}</button>`).join('')}</div>
      <div class="qc-fb" id="qc-fb-${lesson.id}"></div>
    </div>
  `;
}
updateModuleProgress();
renderSidebar();
renderContent();
initUserName();
</script>
