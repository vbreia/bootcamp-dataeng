<script>
// ─── Nome do usuário ─────────────────────────────────────────────────────
function initUserName() {
  const name = localStorage.getItem('de_user_name');
  if (name) {
    updateGreeting(name.split(' ')[0]);
  } else {
    document.getElementById('name-modal').style.display = 'flex';
    document.getElementById('name-input').focus();
  }
}

function openNameModal() {
  const input = document.getElementById('name-input');
  input.value = localStorage.getItem('de_user_name') || '';
  document.getElementById('name-modal').style.display = 'flex';
  input.focus();
  input.select();
}

function saveUserName() {
  const input = document.getElementById('name-input');
  const name = input.value.trim();
  if (!name) {
    input.style.borderColor = 'var(--red)';
    input.focus();
    return;
  }
  input.style.borderColor = '';
  const firstName = name.split(' ')[0];
  localStorage.setItem('de_user_name', name);
  document.getElementById('name-modal').style.display = 'none';
  updateGreeting(firstName);
}

function updateGreeting(name) {
  const el = document.getElementById('user-greeting');
  if (el) {
    el.innerHTML = `Olá, <strong>${name}</strong>! <a class="user-edit" onclick="openNameModal()">editar nome</a>`;
  }
}

function handleNameKeydown(e) {
  if (e.key === 'Enter') saveUserName();
}

const STORAGE_KEY = 'de_module_modelagem_v1';

// ─── Backup completo (todas as chaves) ────────────────────────────────────
const BACKUP_KEYS = [
  'de_user_name',
  'de_study_local_v2',
  'de_module_sql_v1',
  'de_module_modelagem_v1',
  'de_module_airflow_v1',
  'de_module_python_v1',
  'de_module_cloud_v1',
  'de_module_processos_v1'
];

function exportBackup() {
  const data = {};
  BACKUP_KEYS.forEach(function(key) {
    const val = localStorage.getItem(key);
    if (val !== null) data[key] = val;
  });
  const name = (localStorage.getItem('de_user_name') || 'usuario').split(' ')[0]
    .toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
  const date = new Date().toISOString().split('T')[0];
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'bootcamp-etransparente-backup-' + name + '-' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup exportado!', '⬇');
}

function importBackup() {
  document.getElementById('import-file-input').click();
}

function handleImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      let count = 0;
      BACKUP_KEYS.forEach(function(key) {
        if (data[key] !== undefined) {
          localStorage.setItem(key, data[key]);
          count++;
        }
      });
      if (count === 0) {
        showToast('Erro: nenhuma chave reconhecida no arquivo.', '❌');
        return;
      }
      showToast(count + ' dados importados! Recarregando...', '✅');
      setTimeout(function() { location.reload(); }, 1500);
    } catch (err) {
      showToast('Erro: arquivo invalido. Verifique o JSON.', '❌');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

const LESSONS = [
{
  id: 'medallion', tag: 'owned',
  title: 'Medallion Architecture (Bronze/Silver/Gold)',
  eyebrow: 'Aula 1 de 7 · Arquitetura de camadas',
  sub: 'O padrão que organiza um Data Lake em estágios de confiabilidade crescente',
  video: 'https://etransparentebootcamp.blob.core.windows.net/videos/modelagem/modelagem1.Arquitetura_Medallion.mp4',
  body: `
<p>Medallion Architecture é um padrão de organização de dados dentro de um Data Lake em três camadas progressivas de qualidade e confiabilidade, popularizado pela comunidade Databricks/Spark, mas aplicável em qualquer stack — incluindo Azure Data Lake com Airflow, como no seu pipeline-etransparente.</p>
<h3>As três camadas, em detalhe</h3>
<p><strong>Bronze</strong> — dado bruto, exatamente como chegou da fonte (API, scraping, upload manual). Sem nenhuma transformação, sem limpeza, sem validação de schema. Serve como registro histórico auditável e ponto de reprocessamento: se uma regra de negócio mudar ou um bug for encontrado na Silver, você reprocessa a partir da Bronze sem precisar re-extrair da fonte original.</p>
<p><strong>Silver</strong> — dado limpo, validado e padronizado. Tipos corrigidos, duplicatas removidas, nulos tratados, nomes de coluna padronizados. Ainda granular (uma linha por evento/registro), mas já confiável o suficiente para ser consultado por outras equipes técnicas.</p>
<p><strong>Gold</strong> — dado agregado e modelado especificamente para consumo: dashboards, relatórios, modelos de Machine Learning. Geralmente já estruturado como Star Schema (fatos e dimensões), otimizado para leitura analítica.</p>
<pre><code>storage/
  bronze/
    ongs_raw_2026_01.json      -- exatamente como veio do scraping
  silver/
    ongs_clean.parquet         -- tipado, sem duplicatas, validado
  gold/
    score_transparencia.parquet -- agregado, pronto para o dashboard</code></pre>
<h3>Por que não processar tudo direto na camada final?</h3>
<div class="callout tip">💡 Essa é a pergunta mais comum em entrevista sobre o tema. A resposta: separar em camadas permite reprocessamento sem re-extrair da fonte, isolamento de falhas (um bug na transformação não corrompe o dado bruto), e auditoria histórica de exatamente o que foi recebido em cada momento.</div>
<h3>Idempotência entre camadas</h3>
<p>Um pipeline bem desenhado entre camadas é idempotente: rodar o processo Bronze→Silver duas vezes para o mesmo período não deve duplicar dados nem gerar resultado diferente. Isso geralmente é resolvido com estratégias de <em>upsert</em> (inserir ou atualizar) em vez de <em>append</em> puro, ou particionando por data de processamento e sobrescrevendo a partição inteira a cada execução.</p>
<h3>Onde a Medallion se conecta com Orquestração</h3>
<p>Cada camada tipicamente corresponde a uma ou mais tasks dentro de uma DAG do Airflow — uma task de extração escreve na Bronze, uma task de limpeza lê da Bronze e escreve na Silver, e assim por diante. Isso naturalmente cria pontos de checkpoint: se a task de limpeza falhar, você não perde o dado bruto já extraído.</p>
<h3>Medallion não é exclusivo de nenhuma cloud ou ferramenta</h3>
<p>Apesar de populaizada pelo ecossistema Databricks, a arquitetura em si é um padrão conceitual — pode ser implementada com Azure Data Lake + Airflow + Pandas (como no seu caso), com AWS S3 + Glue, ou com qualquer outra combinação de storage e processamento.</p>
`,
  recap: [

  body: `
<p>Star Schema é o modelo dimensional mais usado em Data Warehousing, formalizado por Ralph Kimball. A ideia central: separar <strong>o que aconteceu</strong> (fato) de <strong>o contexto sobre quem/onde/quando/como</strong> (dimensão) — permitindo consultas analíticas rápidas e intuitivas.</p>
<h3>Tabela Fato</h3>
<p>Contém as métricas numéricas do negócio (valor, quantidade, duração) e chaves estrangeiras apontando para as dimensões relevantes. Tende a ter muitas linhas — uma linha por evento de negócio (uma venda, um clique, uma transação).</p>
<pre><code>-- fato_vendas
id_venda | id_produto (FK) | id_cliente (FK) | id_data (FK) | valor | quantidade</code></pre>
<h3>Tabela Dimensão</h3>
<p>Contém atributos descritivos usados para filtrar, agrupar e dar contexto às métricas do fato. Tende a ter menos linhas, mas mais colunas descritivas.</p>
<pre><code>-- dim_produto
id_produto (PK) | nome | categoria | marca | preco_lista

-- dim_data
id_data (PK) | data_completa | dia_semana | mes | trimestre | ano | eh_feriado</code></pre>
<h3>Por que "Star" (estrela)</h3>
<p>O nome vem do desenho visual: uma tabela fato central conectada a várias dimensões ao redor, como os raios de uma estrela. Essa estrutura simples é o que torna as queries analíticas intuitivas — você praticamente sempre faz JOIN do fato com uma ou mais dimensões:</p>
<pre><code>SELECT d.mes, p.categoria, SUM(f.valor) AS total_vendido
FROM fato_vendas f
JOIN dim_data d ON d.id_data = f.id_data
JOIN dim_produto p ON p.id_produto = f.id_produto
GROUP BY d.mes, p.categoria;</code></pre>
<h3>Dimensão Data — um caso especial e onipresente</h3>
<p>Praticamente todo Star Schema tem uma <code>dim_data</code>, mesmo que pareça redundante com um campo de data simples. Ela existe porque permite atributos derivados (dia da semana, trimestre, feriado) sem recalculá-los toda vez na query — e esses atributos são extremamente comuns em análises de negócio ("vendas por dia da semana", "comparação com o mesmo trimestre do ano anterior").</p>
<h3>Granularidade — a decisão mais importante do fato</h3>
<p>Antes de desenhar uma tabela fato, é preciso definir sua granularidade: o que representa exatamente uma linha? "Um item de um pedido" é diferente de "um pedido inteiro" — a primeira granularidade permite analisar produtos individualmente dentro de um pedido; a segunda, não. Errar a granularidade é o erro de design mais caro de corrigir depois, porque frequentemente exige reconstruir o fato do zero.</p>

<h3>Star vs Snowflake — a diferença visual</h3>
<pre><code>-- STAR: dimensão desnormalizada (tudo em uma tabela)

dim_produto: id_produto | nome | id_categoria (FK) | id_marca (FK)

dim_subcategoria: id_subcategoria | nome_subcategoria
dim_marca: id_marca | nome_marca</code></pre>
<p>No Snowflake, para saber a categoria de um produto, você precisa de um JOIN adicional através de <code>dim_categoria</code> — daí o nome, porque o desenho visual se ramifica como os cristais de um floco de neve, em vez de manter o formato simples de estrela.</p>
<h3>O trade-off central</h3>

  body: `
<p>Slowly Changing Dimensions (SCD) resolve um problema muito comum: o que fazer quando um atributo de uma dimensão muda — por exemplo, um cliente muda de cidade, ou um produto muda de categoria. A resposta depende de uma pergunta de negócio: você precisa saber o valor histórico (como era antes) ou só o valor atual importa?</p>
<h3>SCD Tipo 1 — sobrescrever</h3>
<p>A abordagem mais simples: quando o atributo muda, você simplesmente atualiza o valor na linha existente, perdendo o valor anterior.</p>
<pre><code>-- Antes: id_cliente=1, nome=Ana, cidade=Rio
UPDATE dim_cliente SET cidade = 'São Paulo' WHERE id_cliente = 1;
-- Depois: id_cliente=1, nome=Ana, cidade=São Paulo (Rio não existe mais em lugar nenhum)</code></pre>
<div class="callout warn">⚠️ Toda análise histórica que já foi feita usando esse atributo passa a "mentir" retroativamente — se você somar vendas por cidade do ano passado, as vendas antigas da Ana em "Rio" agora aparecem como se sempre tivessem sido em "São Paulo".</div>
<h3>SCD Tipo 2 — preservar histórico completo</h3>
<p>A abordagem mais usada quando o histórico importa: em vez de atualizar, você insere uma <strong>nova linha</strong> com o valor novo, e marca a linha antiga como "não mais atual", geralmente com colunas de data de início/fim e uma flag.</p>
<pre><code>id_cliente | nome | cidade | data_inicio  | data_fim    | atual
1          | Ana  | Rio    | 2024-01-01   | 2025-06-01  | false
1          | Ana  | SP     | 2025-06-01   | NULL        | true</code></pre>
<p>Agora, uma query que junta o fato de vendas com essa dimensão usando a data da venda (em vez de sempre pegar a linha "atual") reflete corretamente o histórico: vendas antigas continuam associadas a "Rio", vendas novas a "SP".</p>
<pre><code>SELECT dc.cidade, SUM(f.valor)
FROM fato_vendas f
JOIN dim_cliente dc ON dc.id_cliente = f.id_cliente
  AND f.data_venda BETWEEN dc.data_inicio AND COALESCE(dc.data_fim, '9999-12-31')
GROUP BY dc.cidade;</code></pre>
<h3>SCD Tipo 3 — manter só o valor anterior</h3>
<p>Um meio-termo raramente usado: em vez de criar uma nova linha, você adiciona uma coluna extra para guardar apenas o valor <em>imediatamente anterior</em>, sem histórico completo de todas as mudanças.</p>
<pre><code>id_cliente | nome | cidade_atual | cidade_anterior
1          | Ana  | SP           | Rio</code></pre>
<p>Isso só funciona bem quando você sabe, de antemão, que só precisa comparar "antes vs depois" da mudança mais recente — qualquer mudança adicional sobrescreve a anterior, perdendo o histórico mais antigo.</p>
<h3>Escolhendo entre os três</h3>
<div class="callout tip">💡 Pergunta prática para decidir: "se esse atributo mudar, alguém vai querer analisar dados históricos considerando o valor de <em>na época</em>, ou só o valor atual importa daqui pra frente?" Se a resposta é "histórico importa", SCD Tipo 2 é quase sempre a escolha certa em produção.</div>

  id: 'normalizacao', tag: 'critical',
  title: 'Normalização (1FN, 2FN, 3FN)',
  eyebrow: 'Aula 5 de 7 · Fundamentos de modelagem relacional',
  sub: 'Como sistemas transacionais evitam redundância — e por que Data Warehouses fazem o oposto',
  video: 'https://etransparentebootcamp.blob.core.windows.net/videos/modelagem/modelagem5.Modelagem_e_Normalização.mp4',
  body: `
<p>Normalização é o processo de organizar tabelas em um banco relacional para reduzir redundância de dados, principalmente em sistemas transacionais (OLTP) como o backend de um e-commerce ou de um sistema de cadastro. As três primeiras formas normais são a base conceitual mais cobrada.</p>
<h3>Primeira Forma Normal (1FN)</h3>
<p>Toda coluna deve conter um valor atômico — sem listas, arrays ou valores compostos em uma única célula.</p>
<pre><code>-- VIOLA 1FN: telefones como lista numa única coluna
id_cliente | nome | telefones
1          | Ana  | "11999990000, 11988880000"

-- RESPEITA 1FN: uma linha por telefone
id_cliente | nome | telefone
1          | Ana  | 11999990000
1          | Ana  | 11988880000</code></pre>
<h3>Segunda Forma Normal (2FN)</h3>
<p>Além de estar em 1FN, toda coluna não-chave deve depender da <strong>chave primária inteira</strong> — relevante especificamente quando a chave primária é composta (mais de uma coluna).</p>
<pre><code>-- VIOLA 2FN: 'nome_produto' depende só de id_produto, não da chave composta inteira
pedido_item: id_pedido, id_produto, nome_produto, quantidade
-- (chave composta: id_pedido + id_produto)

-- RESPEITA 2FN: nome_produto vai para uma tabela separada, dependendo só de id_produto
pedido_item: id_pedido, id_produto, quantidade
produto: id_produto, nome_produto</code></pre>
<h3>Terceira Forma Normal (3FN)</h3>
<p>Além de estar em 2FN, nenhuma coluna não-chave pode depender de <em>outra coluna não-chave</em> — eliminando dependências transitivas.</p>
<pre><code>-- VIOLA 3FN: cidade_estado depende de cidade, que não é chave
cliente: id_cliente, nome, cidade, cidade_estado

-- RESPEITA 3FN: informação de estado fica associada à cidade numa tabela própria
cliente: id_cliente, nome, id_cidade
cidade: id_cidade, nome_cidade, estado</code></pre>
<h3>O propósito prático da normalização</h3>
<p>Evitar anomalias de atualização: sem normalização, corrigir o nome de uma cidade exigiria atualizar múltiplas linhas de clientes que moram nela — esquecer uma linha gera inconsistência de dados. A normalização garante que cada fato seja armazenado em um único lugar.</p>
<h3>O ponto que costuma confundir: Data Warehouses são desnormalizados de propósito</h3>
<div class="callout warn">⚠️ Um Star Schema (visto na Aula 2) é propositalmente <strong>desnormalizado</strong> em relação às regras acima — uma dimensão de produto guarda categoria, marca e outros atributos todos juntos, mesmo que isso repita informação. Essa é uma escolha consciente: sistemas OLTP priorizam integridade e evitar duplicação (muitas escritas pequenas); Data Warehouses priorizam performance de leitura analítica (poucas escritas, muitas leituras agregando grandes volumes) — para isso, menos JOINs é mais importante que evitar redundância.</div>
<h3>Como isso aparece em entrevista</h3>
<p>Uma pergunta comum: "por que seu Data Warehouse não está na 3FN?". A resposta correta demonstra que você entende que normalização e modelagem dimensional resolvem problemas diferentes — não é um erro, é uma escolha de design apropriada ao contexto de uso.</p>
`,

{
  id: 'datavault', tag: 'bonus',
  title: 'Data Vault 2.0 — conceitos básicos',
  eyebrow: 'Aula 6 de 7 · Modelagem avançada',
  sub: 'Uma alternativa ao Star Schema para ambientes com múltiplas fontes e mudanças frequentes de escopo',
  video: 'https://etransparentebootcamp.blob.core.windows.net/videos/modelagem/modelagem6.Desvendando_Data_Vault_2.mp4',
  body: `
<p>Data Vault 2.0 é uma metodologia de modelagem de dados voltada para Data Warehouses que precisam integrar múltiplas fontes de dados heterogêneas e evoluir rapidamente sem quebrar o histórico já carregado. É um tema mais avançado — mencionar que você conhece o conceito já demonstra visão além do Star Schema tradicional.</p>
<h3>O problema que o Data Vault resolve</h3>
<p>O Star Schema tradicional assume um modelo de negócio relativamente estável. Em ambientes onde novas fontes de dados aparecem com frequência, ou onde regras de negócio mudam rapidamente, alterar um Star Schema já em produção pode ser custoso e arriscado. Data Vault separa estrutura de negócio (que muda pouco) de contexto descritivo (que muda com frequência), tornando o modelo mais resiliente a mudanças.</p>
<h3>Os três blocos de construção</h3>
<ul>
  <li><strong>Hub</strong> — armazena apenas a lista de chaves de negócio únicas de uma entidade (por exemplo, todos os IDs de cliente que já existiram), sem nenhum atributo descritivo.</li>
  <li><strong>Link</strong> — representa relacionamentos entre Hubs (por exemplo, a relação entre cliente e pedido).</li>
  <li><strong>Satellite</strong> — armazena os atributos descritivos e o histórico de mudanças de um Hub ou Link, com data de carregamento e origem da informação.</li>
</ul>

function answerQuiz(lessonIdx, chosen) {
  const lesson = LESSONS[lessonIdx];
  const opts = document.querySelectorAll(`#qc-opts-${lesson.id} .qc-opt`);
  if (opts[0].disabled) return;
  opts.forEach((o, i) => {
    o.disabled = true;
    if (i === lesson.quiz.correct) o.classList.add('correct');
    if (i === chosen && chosen !== lesson.quiz.correct) o.classList.add('wrong');
  });
  const ok = chosen === lesson.quiz.correct;
  APP.quizResults[lesson.id] = ok;
  saveData();
  const fb = document.getElementById(`qc-fb-${lesson.id}`);
  fb.textContent = (ok ? '✅ Correto! ' : '❌ Incorreto. ') + lesson.quiz.explanation;
  fb.className = `qc-fb show ${ok ? 'correct' : 'wrong'}`;
}

function htmlToMarkdown(html) {
  let md = html;
  md = md.replace(/<div class="callout[^"]*">\s*([\s\S]*?)\s*<\/div>/g, (m, p1) => '> ' + p1.replace(/<[^>]+>/g,'').trim() + '\n\n');
  md = md.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, (m, p1) => '```sql\n' + p1.trim() + '\n```\n\n');
  md = md.replace(/<h3>(.*?)<\/h3>/g, '\n### $1\n\n');
  md = md.replace(/<h4>(.*?)<\/h4>/g, '\n#### $1\n\n');
  md = md.replace(/<hr>/g, '\n---\n\n');
  md = md.replace(/<table>[\s\S]*?<\/table>/g, (m) => {
    let rows = [...m.matchAll(/<tr[^>]*>([\s\S]*?)<\/tr>/g)].map(r => r[1]);
    let out = '';
    rows.forEach((r, i) => {
      let cells = [...r.matchAll(/<t[dh][^>]*>([\s\S]*?)<\/t[dh]>/g)].map(c => c[1].replace(/<[^>]+>/g,'').trim());
      out += '| ' + cells.join(' | ') + ' |\n';
      if (i === 0) out += '|' + cells.map(()=>' --- ').join('|') + '|\n';
    });
    return out + '\n';
  });
  md = md.replace(/<ul>/g, '\n').replace(/<\/ul>/g, '\n');
  md = md.replace(/<li>\s*([\s\S]*?)\s*<\/li>/g, '- $1\n');
  md = md.replace(/<p>\s*([\s\S]*?)\s*<\/p>/g, '$1\n\n');
  md = md.replace(/<strong>(.*?)<\/strong>/g, '**$1**');
  md = md.replace(/<em>(.*?)<\/em>/g, '_$1_');
  md = md.replace(/<code>(.*?)<\/code>/g, '`$1`');
  md = md.replace(/<[^>]+>/g, '');
  md = md.replace(/\n{3,}/g, '\n\n');
  return md.trim();
}

function generateLessonMarkdown(lesson, moduleTitle) {
  let md = `# ${lesson.title}\n\n`;
  md += `_${lesson.eyebrow} — ${moduleTitle}_\n\n`;
  md += `> ${lesson.sub}\n\n`;
  md += '---\n\n';
  md += htmlToMarkdown(lesson.body);
  md += '\n\n## Recapitulando\n\n';
  lesson.recap.forEach(r => md += `- ${r}\n`);
  md += '\n## Aprofundar no NotebookLM\n\n';
  md += `**Assunto do notebook:** ${lesson.nblm.subject}\n\n`;
  md += `**Perguntas-guia para o Audio Overview:**\n\n`;
  lesson.nblm.questions.forEach(q => md += `- ${q}\n`);
  md += `\n**Fonte complementar sugerida:** ${lesson.nblm.source}\n\n`;
  md += '---\n\n';
  md += `**Teste rapido:** ${lesson.quiz.q}\n\n`;
  lesson.quiz.options.forEach((o,i) => md += `${i === lesson.quiz.correct ? '- [x]' : '- [ ]'} ${o}\n`);
  md += `\n> **Explicacao:** ${lesson.quiz.explanation}\n`;
  return md;
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function exportLessonMD(lessonIdx) {
  const lesson = LESSONS[lessonIdx];
  const md = generateLessonMarkdown(lesson, "Modelagem de Dados");
